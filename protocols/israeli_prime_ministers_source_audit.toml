name = "israeli_prime_ministers_source_audit"
description = "Audit Torah-code.org Israeli prime-ministers main page, keyword PDF, and detail pages without running ELS results."
manifest_out = "reports/wrr_1994/israeli_prime_ministers_source_audit_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "download_wrr_sources"
description = "Download Torah-code.org experiment pages and source PDFs into ignored reports output."
argv = [
  "-m", "scripts.download_wrr_sources",
  "--out-dir", "reports/wrr_1994",
  "--manifest-out", "reports/wrr_1994/sources.manifest.json",
]
inputs = [
  "scripts/download_wrr_sources.py",
]
outputs = [
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.html",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.pdf",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers_1.html",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers_8.html",
  "reports/wrr_1994/sources.manifest.json",
]

[[steps]]
id = "audit_israeli_prime_ministers_source_shape"
description = "Extract source-shape counts and source-coverage gap from the Israeli prime-ministers sources."
argv = [
  "-m", "scripts.analyze_israeli_prime_ministers_source",
  "--main-html", "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.html",
  "--pdf", "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.pdf",
  "--keyword-page-glob", "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers_*.html",
  "--out", "reports/wrr_1994/israeli_prime_ministers_source_records.csv",
  "--pdf-keywords-out", "reports/wrr_1994/israeli_prime_ministers_pdf_keyword_rows.csv",
  "--detail-pages-out", "reports/wrr_1994/israeli_prime_ministers_detail_pages.csv",
  "--summary-out", "reports/wrr_1994/israeli_prime_ministers_source_summary.csv",
  "--anchors-out", "reports/wrr_1994/israeli_prime_ministers_protocol_anchors.csv",
  "--markdown-out", "docs/ISRAELI_PRIME_MINISTERS_SOURCE_AUDIT.md",
  "--manifest-out", "reports/wrr_1994/israeli_prime_ministers_source_audit.manifest.json",
]
inputs = [
  "scripts/analyze_israeli_prime_ministers_source.py",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.html",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers.pdf",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers_1.html",
  "reports/wrr_1994/torah_code_experiment_israeli_prime_ministers_8.html",
]
outputs = [
  "reports/wrr_1994/israeli_prime_ministers_source_records.csv",
  "reports/wrr_1994/israeli_prime_ministers_pdf_keyword_rows.csv",
  "reports/wrr_1994/israeli_prime_ministers_detail_pages.csv",
  "reports/wrr_1994/israeli_prime_ministers_source_summary.csv",
  "reports/wrr_1994/israeli_prime_ministers_protocol_anchors.csv",
  "docs/ISRAELI_PRIME_MINISTERS_SOURCE_AUDIT.md",
  "reports/wrr_1994/israeli_prime_ministers_source_audit.manifest.json",
]
