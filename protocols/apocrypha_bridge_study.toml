  "scripts/analyze_apocrypha_bridge_shuffled_controls.py",
  "scripts/analyze_apocrypha_bridge_candidates.py",
  "scripts/analyze_apocrypha_bridge_controls.py",
  "configs/example_ebible_engkjv_apocrypha.toml",
  "data/processed/ebible/eng-kjv.csv",
  "terms/english_search_terms.csv",
  "reports/kjv_apocrypha_bridge_candidates/bridge_candidates.csv",
]
outputs = [
  "reports/kjv_apocrypha_bridge_shuffled_controls/sample_summary.csv",
  "reports/kjv_apocrypha_bridge_shuffled_controls/summary.csv",
  "docs/KJV_APOCRYPHA_BRIDGE_SHUFFLED_CONTROLS.md",
  "reports/kjv_apocrypha_bridge_shuffled_controls/manifest.json",
]

[[steps]]
id = "bridge_completion_review"
description = "Restate LXX and KJVA bridge candidates as canonical-partial / apocrypha-completed paths."
argv = ["-m", "scripts.build_apocrypha_bridge_completion_review"]
inputs = [
  "scripts/build_apocrypha_bridge_completion_review.py",
  "reports/apocrypha_bridge_candidates/bridge_candidates.csv",
  "reports/kjv_apocrypha_bridge_candidates/bridge_candidates.csv",
  "els/report_index.py",
  "els/term_display.py",
]
outputs = [
  "reports/apocrypha_bridge_completion_review/completion_rows.csv",
  "reports/apocrypha_bridge_completion_review/summary.csv",
  "docs/APOCRYPHA_BRIDGE_COMPLETION_REVIEW.md",
  "reports/apocrypha_bridge_completion_review/manifest.json",
]

[[steps]]
id = "docs_index"
description = "Refresh documentation index after apocrypha study outputs."
argv = ["-m", "scripts.build_docs_index", "--docs-dir", "docs", "--out", "docs/INDEX.md"]
inputs = [
  "scripts/build_docs_index.py",
  "els/project_index.py",
  "docs/APOCRYPHA_BRIDGE_STUDY.md",
  "docs/APOCRYPHA_SOURCE_COVERAGE.md",
  "docs/APOCRYPHA_BRIDGE_CANDIDATES.md",
  "docs/APOCRYPHA_BRIDGE_CONTEXT.md",
  "docs/APOCRYPHA_BRIDGE_CONTROLS.md",
  "docs/APOCRYPHA_BRIDGE_SHUFFLED_CONTROLS.md",
  "docs/APOCRYPHA_ONLY_COUNTS.md",
  "docs/KJV_APOCRYPHA_ONLY_COUNTS.md",
  "docs/KJV_APOCRYPHA_BRIDGE_CANDIDATES.md",
  "docs/KJV_APOCRYPHA_BRIDGE_CONTEXT.md",
  "docs/KJV_APOCRYPHA_BRIDGE_CONTROLS.md",
  "docs/KJV_APOCRYPHA_BRIDGE_SHUFFLED_CONTROLS.md",
  "docs/APOCRYPHA_BRIDGE_COMPLETION_REVIEW.md",
]
outputs = ["docs/INDEX.md"]

[[steps]]
id = "protocol_index"
description = "Refresh protocol index after adding the apocrypha study protocol."
argv = ["-m", "scripts.build_protocol_index", "--protocols-dir", "protocols", "--out", "protocols/INDEX.md"]
inputs = [
  "scripts/build_protocol_index.py",
  "els/project_index.py",
  "protocols/apocrypha_bridge_study.toml",
]
outputs = ["protocols/INDEX.md"]
