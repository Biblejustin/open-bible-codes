[[steps]]
id = "extension_summary_tr_nt"
description = "Summarize strongest TR NT phrase-extension rows for the prospective cohort."
argv = [
  "-m", "els", "extension-summary",
  "--extensions", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt.csv",
  "--min-extension-length", "3",
  "--min-term-length", "4",
  "--match-kind-prefix", "phrase_",
  "--top", "3000",
  "--out", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt_summary.csv",
  "--top-out", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt_top.csv",
