[[steps]]
id = "pattern_presence"
description = "Summarize exact extension-key presence by Greek NT source for prospective rows."
argv = [
  "-m", "scripts.analyze_extension_presence",
  "--top-file", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt_top.csv",
  "--top-file", "reports/greek_expanded_prospective_exact_center/extensions_byz_nt_top.csv",
