  "--surface-context-hits", "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "--require-center-exact",
  "--dedupe-rows",
  "--corpus", "TR_NT",
  "--corpus", "BYZ_NT",
  "--corpus", "TCG_NT",
  "--corpus", "SBLGNT",
  "--title", "Greek Expanded Prospective Exact-Center Pattern Presence",
  "--description", "Exact extension-key presence by Greek NT source for a locked expanded prospective term list.",
  "--summary-out", "reports/greek_expanded_prospective_exact_center/pattern_presence.csv",
  "--markdown-out", "reports/greek_expanded_prospective_exact_center/pattern_presence.md",
  "--manifest-out", "reports/greek_expanded_prospective_exact_center/pattern_presence.manifest.json",
]
inputs = [
  "scripts/analyze_extension_presence.py",
  "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "reports/greek_expanded_prospective_exact_center/extensions_tr_nt_top.csv",
  "reports/greek_expanded_prospective_exact_center/extensions_byz_nt_top.csv",
