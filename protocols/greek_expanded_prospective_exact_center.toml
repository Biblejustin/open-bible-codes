name = "greek_expanded_prospective_exact_center"
description = "Prospective expanded Greek exact-center extension screen over new declared terms."
manifest_out = "reports/greek_expanded_prospective_exact_center/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "surface_context"
description = "Find Greek NT ELS hits whose center/span surface text discusses expanded prospective terms."
argv = [
  "-m", "els", "surface-context",
  "--terms", "terms/greek_expanded_prospective_terms.csv",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus", "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--min-skip", "2",
  "--max-skip", "50",
  "--direction", "both",
  "--min-term-length", "4",
  "--jobs", "0",
  "--out", "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "--summary-out", "reports/greek_expanded_prospective_exact_center/surface_context_summary.csv",
  "--manifest-out", "reports/greek_expanded_prospective_exact_center/surface_context.manifest.json",
]
inputs = [
  "terms/greek_expanded_prospective_terms.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
  "els/surface.py",
]
outputs = [
  "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "reports/greek_expanded_prospective_exact_center/surface_context_summary.csv",
  "reports/greek_expanded_prospective_exact_center/surface_context.manifest.json",
]

[[steps]]
id = "extensions_tr_nt"
description = "Check same-skip phrase extensions for TR NT prospective surface-context hits."
argv = [
  "-m", "els", "extensions",
  "--config", "configs/example_ebible_grctr.toml",
  "--hits", "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "--corpus-label", "TR_NT",
  "--max-before", "12",
  "--max-after", "12",
  "--phrase-words", "4",
  "--include-both-sided",
  "--max-extensions-per-hit", "20",
  "--out", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt.csv",
  "--manifest-out", "reports/greek_expanded_prospective_exact_center/extensions_tr_nt.manifest.json",
]
inputs = [
  "reports/greek_expanded_prospective_exact_center/surface_context_hits.csv",
  "configs/example_ebible_grctr.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/extensions.py",
  "els/search.py",
]
outputs = [
  "reports/greek_expanded_prospective_exact_center/extensions_tr_nt.csv",
  "reports/greek_expanded_prospective_exact_center/extensions_tr_nt.manifest.json",
]

