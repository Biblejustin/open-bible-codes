name = "kjva_gutenberg_candidate_source_audit"
description = "Audit Project Gutenberg eBook 30 RDF metadata as a public-domain KJV-complete source candidate."
manifest_out = "reports/kjva_gutenberg_candidate_source/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "kjva_gutenberg_candidate_source_audit"
description = "Record Project Gutenberg RDF metadata without importing or committing Bible text."
argv = ["-m", "scripts.analyze_kjva_gutenberg_candidate_source"]
inputs = [
  "scripts/analyze_kjva_gutenberg_candidate_source.py",
]
outputs = [
  "reports/kjva_gutenberg_candidate_source/source_status.csv",
  "reports/kjva_gutenberg_candidate_source/summary.csv",
  "reports/kjva_gutenberg_candidate_source/anchors.csv",
  "docs/KJVA_GUTENBERG_CANDIDATE_SOURCE_AUDIT.md",
  "reports/kjva_gutenberg_candidate_source/manifest.json",
]
