name = "local_terms_appendix"
description = "Negative/curiosity appendix for fixed local pastor-business and church-location terms."
manifest_out = "reports/local_terms_appendix/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "hebrew_version_presence"
description = "Compare exact Hebrew local-term ELS ref-key patterns across selected Hebrew sources."
argv = [
  "-m",
  "scripts.analyze_hit_version_presence",
  "--language",
  "hebrew",
  "--terms",
  "terms/local_terms_appendix.csv",
  "--all-concepts",
  "--report-title",
  "Local Terms Appendix Hebrew Version Presence",
  "--max-hits-per-term",
  "200",
  "--min-term-length",
  "4",
  "--min-skip",
  "2",
  "--max-skip",
  "250",
  "--direction",
  "both",
  "--corpus-jobs",
  "0",
  "--corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus",
  "UHB=configs/example_uhb.toml",
  "--no-stable-family",
  "--patterns-out",
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "--summary-out",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "--markdown-out",
  "reports/local_terms_appendix/hebrew_version_presence.md",
  "--manifest-out",
  "reports/local_terms_appendix/hebrew_version_presence.manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/local_terms_appendix.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uhb.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "reports/local_terms_appendix/hebrew_version_presence.md",
  "reports/local_terms_appendix/hebrew_version_presence.manifest.json",
]

[[steps]]
id = "greek_version_presence"
description = "Compare exact Greek local-term ELS ref-key patterns across selected Greek NT sources."
argv = [
  "-m",
  "scripts.analyze_hit_version_presence",
  "--language",
  "greek",
  "--terms",
  "terms/local_terms_appendix.csv",
  "--all-concepts",
  "--report-title",
  "Local Terms Appendix Greek Version Presence",
  "--max-hits-per-term",
  "200",
  "--min-term-length",
  "4",
  "--min-skip",
  "2",
  "--max-skip",
  "250",
  "--direction",
  "both",
  "--corpus-jobs",
  "0",
  "--corpus",
  "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus",
  "SBLGNT=configs/example_sblgnt.toml",
  "--no-stable-family",
  "--patterns-out",
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "--summary-out",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "--markdown-out",
  "reports/local_terms_appendix/greek_version_presence.md",
  "--manifest-out",
  "reports/local_terms_appendix/greek_version_presence.manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/local_terms_appendix.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "reports/local_terms_appendix/greek_version_presence.md",
  "reports/local_terms_appendix/greek_version_presence.manifest.json",
]

[[steps]]
id = "control_targets"
description = "Build representative paired-control targets from nonzero local-term rows."
argv = [
  "-m",
  "scripts.analyze_targeted_version_presence",
  "--all-exact-term-ids",
  "--terms",
  "terms/local_terms_appendix.csv",
  "--hebrew-summary",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "--hebrew-patterns",
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "--greek-summary",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "--greek-patterns",
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "--paired-controls",
  "reports/local_terms_appendix/no_paired_controls.csv",
  "--extension-summary",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "--extension-summary",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "--extension-summary",
  "TR_NT=reports/version_presence_extensions/extensions_greek_tr_nt_summary.csv",
  "--extension-summary",
  "SBLGNT=reports/version_presence_extensions/extensions_greek_sblgnt_summary.csv",
  "--extension-top",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "--extension-top",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "--extension-top",
  "TR_NT=reports/version_presence_extensions/extensions_greek_tr_nt_top.csv",
  "--extension-top",
  "SBLGNT=reports/version_presence_extensions/extensions_greek_sblgnt_top.csv",
  "--summary-out",
  "reports/local_terms_appendix/initial_summary.csv",
  "--examples-out",
  "reports/local_terms_appendix/initial_examples.csv",
  "--control-targets-out",
  "reports/local_terms_appendix/control_targets.csv",
  "--markdown-out",
  "reports/local_terms_appendix/initial.md",
  "--markdown-title",
  "Local Terms Appendix Initial Review",
  "--markdown-description",
  "This generated report joins exact version-presence summaries and bounded phrase-extension rows for fixed local curiosity terms before representative controls are run.",
  "--manifest-out",
  "reports/local_terms_appendix/control_targets.manifest.json",
]
inputs = [
  "scripts/analyze_targeted_version_presence.py",
  "els/term_display.py",
  "terms/local_terms_appendix.csv",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "reports/version_presence_extensions/extensions_greek_tr_nt_summary.csv",
  "reports/version_presence_extensions/extensions_greek_sblgnt_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "reports/version_presence_extensions/extensions_greek_tr_nt_top.csv",
  "reports/version_presence_extensions/extensions_greek_sblgnt_top.csv",
]
outputs = [
  "reports/local_terms_appendix/initial_summary.csv",
  "reports/local_terms_appendix/initial_examples.csv",
  "reports/local_terms_appendix/control_targets.csv",
  "reports/local_terms_appendix/initial.md",
  "reports/local_terms_appendix/control_targets.manifest.json",
]

[[steps]]
id = "paired_controls"
description = "Run representative paired controls for nonzero MT_WLC/UHB/TR_NT/SBLGNT local-term rows."
argv = [
  "-m",
  "scripts.analyze_targeted_paired_controls",
  "--target-summary",
  "reports/local_terms_appendix/control_targets.csv",
  "--target-corpus",
  "MT_WLC",
  "--target-corpus",
  "UHB",
  "--target-corpus",
  "TR_NT",
  "--target-corpus",
  "SBLGNT",
  "--min-skip",
  "2",
  "--max-skip",
  "250",
  "--term-shuffle-samples",
  "1000",
  "--random-samples",
  "1000",
  "--jobs",
  "0",
  "--summary-out",
  "reports/local_terms_appendix/paired_controls_summary.csv",
  "--examples-out",
  "reports/local_terms_appendix/paired_controls_examples.csv",
  "--markdown-out",
  "reports/local_terms_appendix/paired_controls.md",
  "--manifest-out",
  "reports/local_terms_appendix/paired_controls.manifest.json",
]
inputs = [
  "reports/local_terms_appendix/control_targets.csv",
  "scripts/analyze_targeted_paired_controls.py",
  "els/statistics.py",
  "configs/example_oshb_wlc.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/search.py",
  "els/stats.py",
]
outputs = [
  "reports/local_terms_appendix/paired_controls_summary.csv",
  "reports/local_terms_appendix/paired_controls_examples.csv",
  "reports/local_terms_appendix/paired_controls.md",
  "reports/local_terms_appendix/paired_controls.manifest.json",
]

[[steps]]
id = "appendix_report"
description = "Regenerate the local terms appendix report with representative paired controls joined back in."
argv = [
  "-m",
  "scripts.analyze_targeted_version_presence",
  "--all-exact-term-ids",
  "--terms",
  "terms/local_terms_appendix.csv",
  "--hebrew-summary",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "--hebrew-patterns",
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "--greek-summary",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "--greek-patterns",
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "--paired-controls",
  "reports/local_terms_appendix/no_paired_controls.csv",
  "--representative-controls",
  "reports/local_terms_appendix/paired_controls_summary.csv",
  "--extension-summary",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "--extension-summary",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "--extension-summary",
  "TR_NT=reports/version_presence_extensions/extensions_greek_tr_nt_summary.csv",
  "--extension-summary",
  "SBLGNT=reports/version_presence_extensions/extensions_greek_sblgnt_summary.csv",
  "--extension-top",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "--extension-top",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "--extension-top",
  "TR_NT=reports/version_presence_extensions/extensions_greek_tr_nt_top.csv",
  "--extension-top",
  "SBLGNT=reports/version_presence_extensions/extensions_greek_sblgnt_top.csv",
  "--summary-out",
  "reports/local_terms_appendix/controlled_summary.csv",
  "--examples-out",
  "reports/local_terms_appendix/controlled_examples.csv",
  "--control-targets-out",
  "reports/local_terms_appendix/controlled_control_targets.csv",
  "--markdown-out",
  "docs/LOCAL_TERMS_APPENDIX_REPORT.md",
  "--markdown-title",
  "Local Terms Negative Appendix Report",
  "--markdown-description",
  "This generated report documents fixed local pastor-business and church-location terms as a negative/curiosity appendix. It records exact presence, absence, and representative-control status without interpretive promotion.",
  "--manifest-out",
  "reports/local_terms_appendix/appendix_report.manifest.json",
]
inputs = [
  "scripts/analyze_targeted_version_presence.py",
  "els/term_display.py",
  "terms/local_terms_appendix.csv",
  "reports/local_terms_appendix/hebrew_term_summary.csv",
  "reports/local_terms_appendix/hebrew_hit_patterns.csv",
  "reports/local_terms_appendix/greek_term_summary.csv",
  "reports/local_terms_appendix/greek_hit_patterns.csv",
  "reports/local_terms_appendix/paired_controls_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "reports/version_presence_extensions/extensions_greek_tr_nt_summary.csv",
  "reports/version_presence_extensions/extensions_greek_sblgnt_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "reports/version_presence_extensions/extensions_greek_tr_nt_top.csv",
  "reports/version_presence_extensions/extensions_greek_sblgnt_top.csv",
]
outputs = [
  "reports/local_terms_appendix/controlled_summary.csv",
  "reports/local_terms_appendix/controlled_examples.csv",
  "reports/local_terms_appendix/controlled_control_targets.csv",
  "docs/LOCAL_TERMS_APPENDIX_REPORT.md",
  "reports/local_terms_appendix/appendix_report.manifest.json",
]
