name = "kjva_crosswire_candidate_source_audit"
description = "Audit CrossWire GitLab KJV/KJVA metadata as a possible future KJVA source candidate."
manifest_out = "reports/kjva_crosswire_candidate_source/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "kjva_crosswire_candidate_source_audit"
description = "Record GitLab metadata without importing or committing Bible text."
argv = ["-m", "scripts.analyze_kjva_crosswire_candidate_source"]
inputs = [
  "scripts/analyze_kjva_crosswire_candidate_source.py",
]
outputs = [
  "reports/kjva_crosswire_candidate_source/source_status.csv",
  "reports/kjva_crosswire_candidate_source/summary.csv",
  "reports/kjva_crosswire_candidate_source/anchors.csv",
  "docs/KJVA_CROSSWIRE_CANDIDATE_SOURCE_AUDIT.md",
  "reports/kjva_crosswire_candidate_source/manifest.json",
]
