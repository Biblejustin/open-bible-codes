name = "cities_source_page_line_crop_priority_contact_sheet"
description = "Build local contact sheets grouped by Cities source-page line-crop triage priority."
manifest_out = "reports/cities_pdf_recovery_probe/source_page_line_crop_priority_contact_sheet_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_cities_source_page_line_crop_priority_contact_sheet"
description = "Group triaged line-crop images into priority contact sheets without source-row import."
argv = [
  "-m", "scripts.build_cities_source_page_line_crop_priority_contact_sheet",
  "--triage", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
  "--base-dir", "reports/cities_pdf_recovery_probe/source_page_line_crops/priority_contact_sheets",
  "--out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.csv",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet_summary.csv",
  "--markdown-out", "docs/CITIES_SOURCE_PAGE_LINE_CROP_PRIORITY_CONTACT_SHEET.md",
  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_line_crop_priority_contact_sheet.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
]
outputs = [
  "reports/cities_pdf_recovery_probe/source_page_line_crops/priority_contact_sheets/priority_1_dense_text_line_crops.png",
  "reports/cities_pdf_recovery_probe/source_page_line_crops/priority_contact_sheets/priority_2_medium_text_line_crops.png",
  "reports/cities_pdf_recovery_probe/source_page_line_crops/priority_contact_sheets/priority_3_short_text_line_crops.png",
  "reports/cities_pdf_recovery_probe/source_page_line_crops/priority_contact_sheets/priority_4_no_text_line_crops.png",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet_summary.csv",
  "docs/CITIES_SOURCE_PAGE_LINE_CROP_PRIORITY_CONTACT_SHEET.md",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.manifest.json",
]
