[[steps]]
id = "summary"
description = "Summarize Hebrew Atbash transformed-text ELS hits."
argv = [
  "-m", "scripts.summarize_transformed_els",
  "--hits", "reports/hebrew_atbash_audit/MT_WLC_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/UXLC_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/MAM_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/EBIBLE_WLC_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/UHB_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/HEB_AHAD_HAAM_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/HEB_BIALIK_hits.csv",
  "--hits", "reports/hebrew_atbash_audit/HEB_BRENNER_hits.csv",
  "--title", "Hebrew Atbash Transformed-Text Audit",
  "--description", "Opt-in Hebrew Atbash transformed-text ELS audit over declared Jeremiah cryptogram terms.",
  "--summary-out", "reports/hebrew_atbash_audit/summary.csv",
  "--markdown-out", "docs/HEBREW_ATBASH_AUDIT.md",
  "--manifest-out", "reports/hebrew_atbash_audit/summary.manifest.json"
]
inputs = [
  "scripts/summarize_transformed_els.py",
  "els/term_display.py",
  "reports/hebrew_atbash_audit/MT_WLC_hits.csv",
  "reports/hebrew_atbash_audit/UXLC_hits.csv",
  "reports/hebrew_atbash_audit/MAM_hits.csv",
  "reports/hebrew_atbash_audit/EBIBLE_WLC_hits.csv",
  "reports/hebrew_atbash_audit/UHB_hits.csv",
  "reports/hebrew_atbash_audit/HEB_AHAD_HAAM_hits.csv",
  "reports/hebrew_atbash_audit/HEB_BIALIK_hits.csv",
  "reports/hebrew_atbash_audit/HEB_BRENNER_hits.csv",
]
outputs = ["reports/hebrew_atbash_audit/summary.csv", "docs/HEBREW_ATBASH_AUDIT.md", "reports/hebrew_atbash_audit/summary.manifest.json"]
