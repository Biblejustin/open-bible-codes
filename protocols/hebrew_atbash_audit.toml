name = "hebrew_atbash_audit"
description = "Opt-in Hebrew Atbash transformed-text ELS audit for declared Jeremiah cryptogram terms."
manifest_out = "reports/hebrew_atbash_audit/protocol_run.manifest.json"
max_parallel = 4
progress_interval_seconds = 15

[[steps]]
id = "search_mt_wlc"
description = "Search MT_WLC after Hebrew Atbash substitution."
argv = ["-m", "scripts.search_transformed_els", "--config", "configs/example_oshb_wlc.toml", "--corpus-label", "MT_WLC", "--transform", "hebrew_atbash", "--terms", "terms/hebrew_atbash_audit_terms.csv", "--min-skip", "2", "--max-skip", "100", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/hebrew_atbash_audit/MT_WLC_hits.csv"]
inputs = ["scripts/search_transformed_els.py", "els/transforms.py", "els/search.py", "els/corpus.py", "configs/example_oshb_wlc.toml", "terms/hebrew_atbash_audit_terms.csv"]
outputs = ["reports/hebrew_atbash_audit/MT_WLC_hits.csv"]

[[steps]]
id = "search_uxlc"
description = "Search UXLC after Hebrew Atbash substitution."
argv = ["-m", "scripts.search_transformed_els", "--config", "configs/example_uxlc.toml", "--corpus-label", "UXLC", "--transform", "hebrew_atbash", "--terms", "terms/hebrew_atbash_audit_terms.csv", "--min-skip", "2", "--max-skip", "100", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/hebrew_atbash_audit/UXLC_hits.csv"]
inputs = ["scripts/search_transformed_els.py", "els/transforms.py", "els/search.py", "els/corpus.py", "configs/example_uxlc.toml", "terms/hebrew_atbash_audit_terms.csv"]
