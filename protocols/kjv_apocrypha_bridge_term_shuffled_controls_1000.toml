name = "kjv_apocrypha_bridge_term_shuffled_controls_1000"
description = "Run 1000-sample term-level shuffled apocrypha/deuterocanon bridge controls for KJVA bridge terms."
manifest_out = "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 30

[[steps]]
id = "kjv_term_shuffled_controls_1000"
description = "Compare KJVA bridge terms with 1000 shuffled apocrypha-block controls."
argv = [
  "-m", "scripts.analyze_apocrypha_bridge_term_shuffled_controls",
  "--canonical-label", "KJVA",
  "--canonical-config", "configs/example_ebible_engkjv_apocrypha.toml",
  "--terms", "terms/english_search_terms.csv",
  "--observed", "reports/kjv_apocrypha_bridge_candidates/bridge_candidates.csv",
  "--samples", "1000",
  "--jobs", "0",
  "--resume-samples",
  "--sample-out", "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/sample_summary.csv",
  "--term-sample-out", "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/term_samples.csv",
  "--term-summary-out", "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/term_summary.csv",
  "--markdown-out", "docs/KJV_APOCRYPHA_BRIDGE_TERM_SHUFFLED_CONTROLS_1000.md",
  "--manifest-out", "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/manifest.json",
]
inputs = [
  "scripts/analyze_apocrypha_bridge_term_shuffled_controls.py",
  "scripts/analyze_apocrypha_bridge_shuffled_controls.py",
  "scripts/analyze_apocrypha_bridge_candidates.py",
  "scripts/analyze_apocrypha_bridge_controls.py",
  "configs/example_ebible_engkjv_apocrypha.toml",
  "data/processed/ebible/eng-kjv.csv",
  "terms/english_search_terms.csv",
  "reports/kjv_apocrypha_bridge_candidates/bridge_candidates.csv",
]
outputs = [
  "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/sample_summary.csv",
  "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/term_samples.csv",
  "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/term_summary.csv",
  "docs/KJV_APOCRYPHA_BRIDGE_TERM_SHUFFLED_CONTROLS_1000.md",
  "reports/kjv_apocrypha_bridge_term_shuffled_controls_1000/manifest.json",
]
