name = "cities_source_page_ocr_review_packet"
description = "Build local Hebrew OCR review sidecars for locked Cities source pages without importing source rows."
manifest_out = "reports/cities_pdf_recovery_probe/source_page_ocr_review_packet_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_cities_source_page_ocr_review_packet"
description = "Run local Hebrew OCR against locked Cities source-page images and write count/path review packet only."
argv = [
  "-m", "scripts.build_cities_source_page_ocr_review_packet",
  "--bundle", "reports/cities_pdf_recovery_probe/cities_source_page_review_bundle.csv",
  "--base-dir", "reports/cities_pdf_recovery_probe/source_page_ocr_review",
  "--tessdata-dir", "reports/wrr_1994/tessdata",
  "--language", "heb",
  "--psm", "4",
  "--out", "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet.csv",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet_summary.csv",
  "--markdown-out", "docs/CITIES_SOURCE_PAGE_OCR_REVIEW_PACKET.md",
  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_ocr_review_packet.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_review_bundle.csv",
  "reports/wrr_1994/tessdata/heb.traineddata",
]
outputs = [
  "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet_summary.csv",
  "docs/CITIES_SOURCE_PAGE_OCR_REVIEW_PACKET.md",
  "reports/cities_pdf_recovery_probe/cities_source_page_ocr_review_packet.manifest.json",
]
