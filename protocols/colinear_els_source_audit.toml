name = "colinear_els_source_audit"
description = "Audit co-linear ELS paper and attachment source shapes without running ELS results."
manifest_out = "reports/wrr_1994/colinear_els_source_audit_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "download_wrr_sources"
description = "Download Torah-code.org co-linear ELS paper and attachment sources into ignored reports output."
argv = [
  "-m", "scripts.download_wrr_sources",
  "--out-dir", "reports/wrr_1994",
  "--manifest-out", "reports/wrr_1994/sources.manifest.json",
]
inputs = [
  "scripts/download_wrr_sources.py",
]
outputs = [
  "reports/wrr_1994/torah_code_colinear_paper.pdf",
  "reports/wrr_1994/torah_code_colinear_attachments.html",
  "reports/wrr_1994/torah_code_colinear_attachment_pls.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_roots.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_all_1698.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_res_113.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_consul_138.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_intersec_108.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_comb_143.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_att_heb.pdf",
  "reports/wrr_1994/sources.manifest.json",
]

[[steps]]
id = "audit_colinear_els_sources"
description = "Parse source-shape counts and protocol anchors from the co-linear ELS paper and attachments."
argv = [
  "-m", "scripts.analyze_colinear_els_source",
  "--paper", "reports/wrr_1994/torah_code_colinear_paper.pdf",
  "--attachments-page", "reports/wrr_1994/torah_code_colinear_attachments.html",
  "--out", "reports/wrr_1994/colinear_els_attachment_sources.csv",
  "--summary-out", "reports/wrr_1994/colinear_els_source_summary.csv",
  "--anchors-out", "reports/wrr_1994/colinear_els_protocol_anchors.csv",
  "--markdown-out", "docs/COLINEAR_ELS_SOURCE_AUDIT.md",
  "--manifest-out", "reports/wrr_1994/colinear_els_source_audit.manifest.json",
]
inputs = [
  "scripts/analyze_colinear_els_source.py",
  "reports/wrr_1994/torah_code_colinear_paper.pdf",
  "reports/wrr_1994/torah_code_colinear_attachments.html",
  "reports/wrr_1994/torah_code_colinear_attachment_pls.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_roots.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_all_1698.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_res_113.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_consul_138.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_intersec_108.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_comb_143.pdf",
  "reports/wrr_1994/torah_code_colinear_attachment_att_heb.pdf",
]
outputs = [
  "reports/wrr_1994/colinear_els_attachment_sources.csv",
  "reports/wrr_1994/colinear_els_source_summary.csv",
  "reports/wrr_1994/colinear_els_protocol_anchors.csv",
  "docs/COLINEAR_ELS_SOURCE_AUDIT.md",
  "reports/wrr_1994/colinear_els_source_audit.manifest.json",
]
