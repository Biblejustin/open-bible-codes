name = "hebrew_screening_version_presence"
description = "Capped exact ELS hit-pattern presence for broader Hebrew screening terms across MT-family corpora."
manifest_out = "reports/hebrew_screening_version_presence/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "hebrew_screening_version_presence"
description = "Compare exact broader Hebrew screening hit ref-key patterns across MT_WLC, UXLC, EBIBLE_WLC, MAM, and UHB."
argv = [
  "-m",
  "scripts.analyze_hit_version_presence",
  "--language",
  "hebrew",
  "--terms",
  "terms/theological_terms.csv",
  "--terms",
  "terms/modern_names_dates.csv",
  "--terms",
  "terms/table_of_nations.csv",
  "--terms",
  "terms/prophetic_terms.csv",
  "--terms",
  "terms/hebrew_claim_terms.csv",
  "--terms",
  "terms/biblical_tribes.csv",
  "--terms",
  "terms/biblical_festivals.csv",
  "--terms",
  "terms/biblical_calendar.csv",
  "--all-concepts",
  "--duplicate-term-id",
  "first",
  "--report-title",
  "Hebrew Screening Version Presence",
  "--max-hits-per-term",
  "50",
  "--corpus-jobs",
  "0",
  "--corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus",
  "UXLC=configs/example_uxlc.toml",
  "--corpus",
  "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus",
  "MAM=configs/example_mam.toml",
  "--corpus",
  "UHB=configs/example_uhb.toml",
  "--patterns-out",
  "reports/hebrew_screening_version_presence/hit_patterns.csv",
  "--summary-out",
  "reports/hebrew_screening_version_presence/term_summary.csv",
  "--markdown-out",
  "reports/hebrew_screening_version_presence/hebrew_screening_version_presence.md",
  "--manifest-out",
  "reports/hebrew_screening_version_presence/manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "terms/hebrew_claim_terms.csv",
  "terms/biblical_tribes.csv",
  "terms/biblical_festivals.csv",
  "terms/biblical_calendar.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/hebrew_screening_version_presence/hit_patterns.csv",
  "reports/hebrew_screening_version_presence/term_summary.csv",
  "reports/hebrew_screening_version_presence/hebrew_screening_version_presence.md",
  "reports/hebrew_screening_version_presence/manifest.json",
]
