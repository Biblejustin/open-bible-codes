inputs = ["scripts/search_word_edge_patterns.py", "els/corpus.py", "els/normalization.py", "configs/example_mam.toml", "terms/word_edge_pattern_audit_terms.csv"]
outputs = ["reports/word_edge_patterns/MAM_hits.csv"]

