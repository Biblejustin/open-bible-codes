argv = ["-m", "scripts.search_word_edge_patterns", "--config", "configs/nonbible_hebrew_pby_brenner.toml", "--corpus-label", "HEB_BRENNER", "--terms", "terms/word_edge_pattern_audit_terms.csv", "--pattern", "both", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/word_edge_patterns/HEB_BRENNER_hits.csv"]
