[[steps]]
id = "summary"
description = "Summarize word-edge pattern audit hits."
argv = [
  "-m", "scripts.summarize_word_edge_patterns",
  "--hits", "reports/word_edge_patterns/MT_WLC_hits.csv",
  "--hits", "reports/word_edge_patterns/UXLC_hits.csv",
  "--hits", "reports/word_edge_patterns/MAM_hits.csv",
  "--hits", "reports/word_edge_patterns/EBIBLE_WLC_hits.csv",
  "--hits", "reports/word_edge_patterns/UHB_hits.csv",
  "--hits", "reports/word_edge_patterns/HEB_AHAD_HAAM_hits.csv",
  "--hits", "reports/word_edge_patterns/HEB_BIALIK_hits.csv",
  "--hits", "reports/word_edge_patterns/HEB_BRENNER_hits.csv",
  "--title", "Word-Edge Pattern Audit",
  "--description", "Opt-in consecutive-word acrostic and telestic audit over declared Hebrew terms.",
  "--cap-threshold", "200",
  "--summary-out", "reports/word_edge_patterns/summary.csv",
  "--markdown-out", "docs/WORD_EDGE_PATTERN_AUDIT.md",
  "--manifest-out", "reports/word_edge_patterns/summary.manifest.json"
]
inputs = [
  "scripts/summarize_word_edge_patterns.py",
  "els/term_display.py",
  "reports/word_edge_patterns/MT_WLC_hits.csv",
  "reports/word_edge_patterns/UXLC_hits.csv",
  "reports/word_edge_patterns/MAM_hits.csv",
  "reports/word_edge_patterns/EBIBLE_WLC_hits.csv",
  "reports/word_edge_patterns/UHB_hits.csv",
  "reports/word_edge_patterns/HEB_AHAD_HAAM_hits.csv",
  "reports/word_edge_patterns/HEB_BIALIK_hits.csv",
  "reports/word_edge_patterns/HEB_BRENNER_hits.csv",
]
outputs = ["reports/word_edge_patterns/summary.csv", "docs/WORD_EDGE_PATTERN_AUDIT.md", "reports/word_edge_patterns/summary.manifest.json"]
