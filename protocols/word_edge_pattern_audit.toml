argv = ["-m", "scripts.search_word_edge_patterns", "--config", "configs/example_uhb.toml", "--corpus-label", "UHB", "--terms", "terms/word_edge_pattern_audit_terms.csv", "--pattern", "both", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/word_edge_patterns/UHB_hits.csv"]
