name = "word_edge_pattern_audit"
description = "Opt-in consecutive-word acrostic and telestic audit for declared Hebrew word-edge terms."
manifest_out = "reports/word_edge_patterns/protocol_run.manifest.json"
max_parallel = 4
progress_interval_seconds = 15

[[steps]]
id = "search_mt_wlc"
description = "Search MT_WLC for consecutive-word acrostic/telestic patterns."
argv = ["-m", "scripts.search_word_edge_patterns", "--config", "configs/example_oshb_wlc.toml", "--corpus-label", "MT_WLC", "--terms", "terms/word_edge_pattern_audit_terms.csv", "--pattern", "both", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/word_edge_patterns/MT_WLC_hits.csv"]
inputs = ["scripts/search_word_edge_patterns.py", "els/corpus.py", "els/normalization.py", "configs/example_oshb_wlc.toml", "terms/word_edge_pattern_audit_terms.csv"]
outputs = ["reports/word_edge_patterns/MT_WLC_hits.csv"]

[[steps]]
id = "search_uxlc"
description = "Search UXLC for consecutive-word acrostic/telestic patterns."
argv = ["-m", "scripts.search_word_edge_patterns", "--config", "configs/example_uxlc.toml", "--corpus-label", "UXLC", "--terms", "terms/word_edge_pattern_audit_terms.csv", "--pattern", "both", "--direction", "both", "--max-hits-per-term", "200", "--out", "reports/word_edge_patterns/UXLC_hits.csv"]
inputs = ["scripts/search_word_edge_patterns.py", "els/corpus.py", "els/normalization.py", "configs/example_uxlc.toml", "terms/word_edge_pattern_audit_terms.csv"]
outputs = ["reports/word_edge_patterns/UXLC_hits.csv"]

