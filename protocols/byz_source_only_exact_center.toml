name = "byz_source_only_exact_center"
description = "Post-discovery 1000/1000 controls for BYZ_NT source-only exact-center extension row."
manifest_out = "reports/byz_source_only_exact_center/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "paired_controls"
description = "Run 1000/1000 controls for BYZ_NT source-only υιος row."
argv = [
  "-m", "scripts.analyze_extension_paired_controls",
  "--top-file", "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "--surface-context-hits", "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "--require-center-exact",
  "--dedupe-targets",
  "--include-overlap-key", "υιοσ|-46|backward|before_plus_term|ειουιοσ|ειουιοσ",
  "--term-control-samples", "1000",
  "--random-control-samples", "1000",
  "--summary-out", "reports/byz_source_only_exact_center/paired_controls_summary.csv",
  "--examples-out", "reports/byz_source_only_exact_center/paired_controls_examples.csv",
  "--markdown-out", "reports/byz_source_only_exact_center/paired_controls.md",
  "--manifest-out", "reports/byz_source_only_exact_center/paired_controls.manifest.json",
]
inputs = [
  "scripts/analyze_extension_paired_controls.py",
  "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "configs/example_ebible_grcmt.toml",
  "els/corpus.py",
  "els/extensions.py",
  "els/search.py",
  "els/statistics.py",
]
outputs = [
  "reports/byz_source_only_exact_center/paired_controls_summary.csv",
  "reports/byz_source_only_exact_center/paired_controls_examples.csv",
  "reports/byz_source_only_exact_center/paired_controls.md",
  "reports/byz_source_only_exact_center/paired_controls.manifest.json",
]

[[steps]]
id = "context_review"
description = "Build control-row-only context and letter-path review for BYZ_NT source-only row."
argv = [
  "-m", "scripts.analyze_extension_context_review",
  "--top-file", "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "--controls", "reports/byz_source_only_exact_center/paired_controls_summary.csv",
  "--surface-context-hits", "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "--require-center-exact",
  "--require-control-row",
  "--dedupe-targets",
  "--title", "BYZ_NT Source-Only Exact-Center Review",
  "--description", "Manual context and letter-path review for post-discovery BYZ_NT source-only exact-center extension row.",
  "--summary-out", "reports/byz_source_only_exact_center/context_review_summary.csv",
  "--markdown-out", "reports/byz_source_only_exact_center/context_review.md",
  "--letter-paths-out", "reports/byz_source_only_exact_center/letter_paths.md",
  "--manifest-out", "reports/byz_source_only_exact_center/context_review.manifest.json",
]
inputs = [
  "scripts/analyze_extension_context_review.py",
  "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "reports/byz_source_only_exact_center/paired_controls_summary.csv",
  "configs/example_ebible_grcmt.toml",
  "els/corpus.py",
  "els/normalization.py",
]
outputs = [
  "reports/byz_source_only_exact_center/context_review_summary.csv",
  "reports/byz_source_only_exact_center/context_review.md",
  "reports/byz_source_only_exact_center/letter_paths.md",
  "reports/byz_source_only_exact_center/context_review.manifest.json",
]
