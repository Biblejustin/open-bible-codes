name = "cities_source_page_contact_sheet"
description = "Build a local visual contact sheet for locked Cities source-page review."
manifest_out = "reports/cities_pdf_recovery_probe/source_page_contact_sheet_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_cities_source_page_contact_sheet"
description = "Render locked Cities source-page images into a local contact sheet without OCR, transcription, or source-row import."
argv = [
  "-m", "scripts.build_cities_source_page_contact_sheet",
  "--bundle", "reports/cities_pdf_recovery_probe/cities_source_page_review_bundle.csv",
  "--contact-sheet-out", "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet.png",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet_summary.csv",
  "--markdown-out", "docs/CITIES_SOURCE_PAGE_CONTACT_SHEET.md",
  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_contact_sheet.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_review_bundle.csv",
]
outputs = [
  "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet.png",
  "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet_summary.csv",
  "docs/CITIES_SOURCE_PAGE_CONTACT_SHEET.md",
  "reports/cities_pdf_recovery_probe/cities_source_page_contact_sheet.manifest.json",
]
