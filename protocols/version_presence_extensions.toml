[[steps]]
id = "summary_hebrew_mt_wlc"
description = "Summarize MT_WLC version-presence phrase extensions."
parallel_group = "summaries"
argv = [
  "-m", "els", "extension-summary",
  "--extensions", "reports/version_presence_extensions/extensions_hebrew_mt_wlc.csv",
  "--min-extension-length", "3",
  "--min-term-length", "4",
  "--match-kind-prefix", "phrase_",
  "--top", "30",
  "--out", "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "--top-out", "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "--manifest-out", "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.manifest.json",
]
inputs = [
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc.csv",
  "els/cli.py",
]
outputs = [
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.manifest.json",
]

