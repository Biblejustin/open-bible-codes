]
outputs = [
  "reports/version_presence_extensions/greek_hits.csv",
  "reports/version_presence_extensions/greek_hits.manifest.json",
]

[[steps]]
id = "extensions_hebrew_mt_wlc"
description = "Check same-skip phrase extensions for exported MT_WLC Hebrew hits."
parallel_group = "extensions"
argv = [
  "-m", "els", "extensions",
  "--config", "configs/example_oshb_wlc.toml",
  "--hits", "reports/version_presence_extensions/hebrew_hits.csv",
  "--corpus-label", "MT_WLC",
  "--max-before", "12",
  "--max-after", "12",
  "--phrase-words", "4",
  "--include-both-sided",
  "--max-extensions-per-hit", "20",
  "--out", "reports/version_presence_extensions/extensions_hebrew_mt_wlc.csv",
  "--manifest-out", "reports/version_presence_extensions/extensions_hebrew_mt_wlc.manifest.json",
]
inputs = [
  "reports/version_presence_extensions/hebrew_hits.csv",
  "configs/example_oshb_wlc.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/extensions.py",
  "els/search.py",
]
outputs = [
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc.manifest.json",
]

