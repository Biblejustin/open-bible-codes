name = "version_presence_extensions"
description = "Same-skip extension screen for bounded all-source version-presence hit queues."
manifest_out = "reports/version_presence_extensions/protocol_run.manifest.json"
max_parallel = 4
progress_interval_seconds = 15

[[steps]]
id = "export_hebrew_hits"
description = "Export bounded Hebrew all-source version-presence patterns as hit rows."
argv = [
  "-m", "scripts.export_version_presence_hits",
  "--patterns", "reports/hebrew_screening_version_presence/hit_patterns.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--presence-scope", "present_all_observed_sources",
  "--max-patterns-per-term", "2",
  "--max-patterns", "120",
  "--out", "reports/version_presence_extensions/hebrew_hits.csv",
  "--manifest-out", "reports/version_presence_extensions/hebrew_hits.manifest.json",
]
inputs = [
  "reports/hebrew_screening_version_presence/hit_patterns.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uhb.toml",
  "scripts/export_version_presence_hits.py",
  "els/corpus.py",
  "els/search.py",
]
outputs = [
  "reports/version_presence_extensions/hebrew_hits.csv",
  "reports/version_presence_extensions/hebrew_hits.manifest.json",
]

[[steps]]
id = "export_greek_hits"
description = "Export bounded Greek all-source version-presence patterns as hit rows."
argv = [
  "-m", "scripts.export_version_presence_hits",
  "--patterns", "reports/greek_screening_version_presence/hit_patterns.csv",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
