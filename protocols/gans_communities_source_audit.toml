name = "gans_communities_source_audit"
description = "Audit the Gans/Inbal/Bombach communities data PDF source shape without running ELS results."
manifest_out = "reports/wrr_1994/gans_communities_source_audit_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "download_wrr_sources"
description = "Download Torah-code.org source PDFs and related WRR audit inputs into ignored reports output."
argv = [
  "-m", "scripts.download_wrr_sources",
  "--out-dir", "reports/wrr_1994",
  "--manifest-out", "reports/wrr_1994/sources.manifest.json",
]
inputs = [
  "scripts/download_wrr_sources.py",
]
outputs = [
  "reports/wrr_1994/gans_communities_data.pdf",
  "reports/wrr_1994/sources.manifest.json",
]

[[steps]]
id = "audit_gans_communities_source_shape"
description = "Extract source-shape counts and protocol anchors from the Gans communities data PDF."
argv = [
  "-m", "scripts.analyze_gans_communities_source",
  "--source", "reports/wrr_1994/gans_communities_data.pdf",
  "--out", "reports/wrr_1994/gans_communities_source_records.csv",
  "--summary-out", "reports/wrr_1994/gans_communities_source_summary.csv",
  "--anchors-out", "reports/wrr_1994/gans_communities_protocol_anchors.csv",
  "--markdown-out", "docs/GANS_COMMUNITIES_SOURCE_AUDIT.md",
  "--manifest-out", "reports/wrr_1994/gans_communities_source_audit.manifest.json",
]
inputs = [
  "scripts/analyze_gans_communities_source.py",
  "reports/wrr_1994/gans_communities_data.pdf",
]
outputs = [
  "reports/wrr_1994/gans_communities_source_records.csv",
  "reports/wrr_1994/gans_communities_source_summary.csv",
  "reports/wrr_1994/gans_communities_protocol_anchors.csv",
  "docs/GANS_COMMUNITIES_SOURCE_AUDIT.md",
  "reports/wrr_1994/gans_communities_source_audit.manifest.json",
]
