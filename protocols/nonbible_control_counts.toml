name = "nonbible_control_counts"
description = "Skip 2..100 screening counts against large non-Bible Hebrew, Greek, and English control corpora."
manifest_out = "reports/nonbible_controls/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "nonbible_control_batch_counts"
description = "Count declared term lists against non-Bible control corpora."
argv = [
  "-m", "els", "batch-many",
  "--term-set", "theological_terms=terms/theological_terms.csv",
  "--term-set", "modern_names_dates=terms/modern_names_dates.csv",
  "--term-set", "table_of_nations=terms/table_of_nations.csv",
  "--term-set", "prophetic_terms=terms/prophetic_terms.csv",
  "--term-set", "hebrew_claim_terms=terms/hebrew_claim_terms.csv",
  "--term-set", "greek_nt_claim_terms=terms/greek_nt_claim_terms.csv",
  "--term-set", "biblical_tribes=terms/biblical_tribes.csv",
  "--term-set", "biblical_festivals=terms/biblical_festivals.csv",
  "--term-set", "biblical_calendar=terms/biblical_calendar.csv",
  "--term-set", "frequency_anchors=terms/frequency_anchors.csv",
  "--term-set", "null_controls=terms/null_controls.csv",
  "--term-set", "english_search_terms=terms/english_search_terms.csv",
  "--corpus", "HEB_PBY_BIALIK=configs/nonbible_hebrew_pby_bialik.toml",
  "--corpus", "HEB_PBY_BRENNER=configs/nonbible_hebrew_pby_brenner.toml",
  "--corpus", "HEB_PBY_AHAD_HAAM=configs/nonbible_hebrew_pby_ahad_haam.toml",
  "--corpus", "GRC_PERSEUS_ILIAD=configs/nonbible_greek_perseus_iliad.toml",
  "--corpus", "GRC_PERSEUS_ODYSSEY=configs/nonbible_greek_perseus_odyssey.toml",
  "--corpus", "GRC_PERSEUS_HERODOTUS=configs/nonbible_greek_perseus_herodotus.toml",
  "--corpus", "ENG_PG_SHAKESPEARE=configs/nonbible_english_pg_shakespeare.toml",
  "--corpus", "ENG_PG_WAR_PEACE=configs/nonbible_english_pg_war_and_peace.toml",
  "--corpus", "ENG_PG_MOBY_DICK=configs/nonbible_english_pg_moby_dick.toml",
  "--min-skip", "2",
  "--max-skip", "100",
  "--jobs", "0",
  "--out-dir", "reports/nonbible_controls",
  "--manifest-out", "reports/nonbible_controls/nonbible_control_counts.manifest.json",
]
inputs = [
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "terms/hebrew_claim_terms.csv",
  "terms/greek_nt_claim_terms.csv",
  "terms/biblical_tribes.csv",
  "terms/biblical_festivals.csv",
  "terms/biblical_calendar.csv",
  "terms/frequency_anchors.csv",
  "terms/null_controls.csv",
  "terms/english_search_terms.csv",
  "configs/nonbible_hebrew_pby_bialik.toml",
  "configs/nonbible_hebrew_pby_brenner.toml",
  "configs/nonbible_hebrew_pby_ahad_haam.toml",
  "configs/nonbible_greek_perseus_iliad.toml",
  "configs/nonbible_greek_perseus_odyssey.toml",
  "configs/nonbible_greek_perseus_herodotus.toml",
  "configs/nonbible_english_pg_shakespeare.toml",
  "configs/nonbible_english_pg_war_and_peace.toml",
  "configs/nonbible_english_pg_moby_dick.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
]
outputs = [
  "reports/nonbible_controls/theological_terms_counts.csv",
  "reports/nonbible_controls/theological_terms_counts.manifest.json",
  "reports/nonbible_controls/modern_names_dates_counts.csv",
  "reports/nonbible_controls/modern_names_dates_counts.manifest.json",
  "reports/nonbible_controls/table_of_nations_counts.csv",
  "reports/nonbible_controls/table_of_nations_counts.manifest.json",
  "reports/nonbible_controls/prophetic_terms_counts.csv",
  "reports/nonbible_controls/prophetic_terms_counts.manifest.json",
  "reports/nonbible_controls/hebrew_claim_terms_counts.csv",
  "reports/nonbible_controls/hebrew_claim_terms_counts.manifest.json",
  "reports/nonbible_controls/greek_nt_claim_terms_counts.csv",
  "reports/nonbible_controls/greek_nt_claim_terms_counts.manifest.json",
  "reports/nonbible_controls/biblical_tribes_counts.csv",
  "reports/nonbible_controls/biblical_tribes_counts.manifest.json",
  "reports/nonbible_controls/biblical_festivals_counts.csv",
  "reports/nonbible_controls/biblical_festivals_counts.manifest.json",
  "reports/nonbible_controls/biblical_calendar_counts.csv",
  "reports/nonbible_controls/biblical_calendar_counts.manifest.json",
  "reports/nonbible_controls/frequency_anchors_counts.csv",
  "reports/nonbible_controls/frequency_anchors_counts.manifest.json",
  "reports/nonbible_controls/null_controls_counts.csv",
  "reports/nonbible_controls/null_controls_counts.manifest.json",
  "reports/nonbible_controls/english_search_terms_counts.csv",
  "reports/nonbible_controls/english_search_terms_counts.manifest.json",
  "reports/nonbible_controls/nonbible_control_counts.manifest.json",
]
