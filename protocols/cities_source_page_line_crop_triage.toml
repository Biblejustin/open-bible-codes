description = "Prioritize source-page line crops by layout and OCR-count signal only."
argv = [
  "-m", "scripts.build_cities_source_page_line_crop_triage",
  "--packet", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_packet.csv",
  "--out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage_summary.csv",
