  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_line_crop_triage.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_packet.csv",
]
outputs = [
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage_summary.csv",
