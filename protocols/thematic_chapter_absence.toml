name = "thematic_chapter_absence"
description = "Run term-absence checks over locked thematic chapter mappings only."
manifest_out = "reports/thematic_chapter_absence/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "thematic_absence_scan"
description = "Scan locked thematic chapter mappings for absent or sparse centered ELS terms."
argv = [
  "-m",
  "scripts.analyze_notable_passage_gaps",
  "--no-config-passages",
  "--thematic-chapters",
  "data/study/mappings/thematic_chapters.csv",
  "--terms-dir",
  "terms",
  "--corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus",
  "UXLC=configs/example_uxlc.toml",
  "--corpus",
  "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus",
  "MAM=configs/example_mam.toml",
  "--corpus",
  "UHB=configs/example_uhb.toml",
  "--corpus",
  "LXX=configs/example_ebible_grclxx.toml",
  "--corpus",
  "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus",
  "SBLGNT=configs/example_sblgnt.toml",
  "--corpus",
  "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus",
  "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--min-skip",
  "2",
  "--max-skip",
  "100",
  "--direction",
  "both",
  "--jobs",
  "0",
  "--min-term-length",
  "3",
  "--common-elsewhere-threshold",
  "10",
  "--skip-missing-passages",
  "--title",
  "Thematic Chapter Absence",
  "--detail-out",
  "reports/thematic_chapter_absence/term_gap_detail.csv",
  "--summary-out",
  "reports/thematic_chapter_absence/passage_summary.csv",
  "--markdown-out",
  "docs/THEMATIC_CHAPTER_ABSENCE.md",
  "--manifest-out",
  "reports/thematic_chapter_absence/manifest.json",
]
inputs = [
  "scripts/analyze_notable_passage_gaps.py",
  "data/study/mappings/thematic_chapters.csv",
  "terms",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "els/corpus.py",
  "els/search.py",
  "els/statistics.py",
  "els/term_display.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/thematic_chapter_absence/term_gap_detail.csv",
  "reports/thematic_chapter_absence/passage_summary.csv",
  "docs/THEMATIC_CHAPTER_ABSENCE.md",
  "reports/thematic_chapter_absence/manifest.json",
]
