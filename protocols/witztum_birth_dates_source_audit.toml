name = "witztum_birth_dates_source_audit"
description = "Audit Witztum Genesis birth-date paper and data PDFs without running ELS results."
manifest_out = "reports/wrr_1994/witztum_birth_dates_source_audit_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "download_wrr_sources"
description = "Download Torah-code.org papers/data PDFs into ignored reports output."
argv = [
  "-m", "scripts.download_wrr_sources",
  "--out-dir", "reports/wrr_1994",
  "--manifest-out", "reports/wrr_1994/sources.manifest.json",
]
inputs = [
  "scripts/download_wrr_sources.py",
]
outputs = [
  "reports/wrr_1994/witztum_birth_dates.pdf",
  "reports/wrr_1994/witztum_birth_dates_data.pdf",
  "reports/wrr_1994/sources.manifest.json",
]

[[steps]]
id = "audit_witztum_birth_dates_source_shape"
description = "Extract source-shape counts and protocol anchors from the Witztum birth-date PDFs."
argv = [
  "-m", "scripts.analyze_witztum_birth_dates_source",
  "--paper-source", "reports/wrr_1994/witztum_birth_dates.pdf",
  "--data-source", "reports/wrr_1994/witztum_birth_dates_data.pdf",
  "--out", "reports/wrr_1994/witztum_birth_dates_source_rows.csv",
  "--summary-out", "reports/wrr_1994/witztum_birth_dates_source_summary.csv",
  "--anchors-out", "reports/wrr_1994/witztum_birth_dates_protocol_anchors.csv",
  "--markdown-out", "docs/WITZTUM_BIRTH_DATES_SOURCE_AUDIT.md",
  "--manifest-out", "reports/wrr_1994/witztum_birth_dates_source_audit.manifest.json",
]
inputs = [
  "scripts/analyze_witztum_birth_dates_source.py",
  "reports/wrr_1994/witztum_birth_dates.pdf",
  "reports/wrr_1994/witztum_birth_dates_data.pdf",
]
outputs = [
  "reports/wrr_1994/witztum_birth_dates_source_rows.csv",
  "reports/wrr_1994/witztum_birth_dates_source_summary.csv",
  "reports/wrr_1994/witztum_birth_dates_protocol_anchors.csv",
  "docs/WITZTUM_BIRTH_DATES_SOURCE_AUDIT.md",
  "reports/wrr_1994/witztum_birth_dates_source_audit.manifest.json",
]
