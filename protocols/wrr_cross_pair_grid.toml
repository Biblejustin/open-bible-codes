name = "wrr_cross_pair_grid"
description = "Build the WRR2 appellation/date cross-pair grid and run cap-250 corrected-distance diagnostics."
manifest_out = "reports/wrr_1994/cross_pair_grid/protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_wrr2_cross_pair_grid"
description = "Cross every imported WRR2 appellation with every imported WRR2 date for permutation prep."
argv = [
  "-m", "scripts.build_wrr_cross_pair_grid",
  "--terms", "reports/wrr_1994/wrr2_terms.csv",
  "--counts", "reports/wrr_1994/wrr2_genesis_counts.csv",
  "--skip-caps", "reports/wrr_1994/wrr2_skip_caps.csv",
  "--out", "reports/wrr_1994/wrr2_cross_pair_grid.csv",
  "--summary-out", "reports/wrr_1994/wrr2_cross_pair_grid_summary.csv",
  "--markdown-out", "reports/wrr_1994/wrr2_cross_pair_grid.md",
  "--manifest-out", "reports/wrr_1994/wrr2_cross_pair_grid.manifest.json",
]
inputs = [
  "scripts/build_wrr_cross_pair_grid.py",
  "reports/wrr_1994/wrr2_terms.csv",
  "reports/wrr_1994/wrr2_genesis_counts.csv",
  "reports/wrr_1994/wrr2_skip_caps.csv",
  "els/wrr.py",
]
outputs = [
  "reports/wrr_1994/wrr2_cross_pair_grid.csv",
  "reports/wrr_1994/wrr2_cross_pair_grid_summary.csv",
  "reports/wrr_1994/wrr2_cross_pair_grid.md",
  "reports/wrr_1994/wrr2_cross_pair_grid.manifest.json",
]

[[steps]]
id = "compute_wrr2_cross_pair_corrected_distance_250"
description = "Run direct perturbed-letter corrected-distance diagnostics over the generated cross-pair grid at cap 250."
argv = [
  "-m", "scripts.analyze_wrr_corrected_distance",
  "--pair-table", "reports/wrr_1994/wrr2_cross_pair_grid.csv",
  "--config", "configs/example_koren_genesis.toml",
  "--candidate-lane", "all",
  "--min-skip", "2",
  "--search-max-skip", "250",
  "--direction", "both",
  "--jobs", "0",
  "--row-width-count", "10",
  "--minimum-valid", "10",
  "--skip-cap-mode", "term",
  "--skip-cap-formula", "printed",
  "--out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "--summary-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_summary.csv",
  "--markdown-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.md",
  "--manifest-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.manifest.json",
]
inputs = [
  "scripts/analyze_wrr_corrected_distance.py",
  "reports/wrr_1994/wrr2_cross_pair_grid.csv",
  "configs/example_koren_genesis.toml",
  "els/wrr.py",
  "els/corpus.py",
  "els/search.py",
]
outputs = [
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_summary.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.md",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.manifest.json",
]

[[steps]]
id = "aggregate_wrr2_cross_pair_corrected_distance_250"
description = "Aggregate cap-250 cross-pair corrected-distance diagnostics into P1..P4."
argv = [
  "-m", "scripts.analyze_wrr_corrected_distance_aggregate",
  "--input", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "--p1-threshold", "0.2",
  "--out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.csv",
  "--markdown-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.md",
  "--manifest-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.manifest.json",
]
inputs = [
  "scripts/analyze_wrr_corrected_distance_aggregate.py",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "els/wrr.py",
]
outputs = [
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.md",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250_aggregate.manifest.json",
]

[[steps]]
id = "run_wrr2_cross_pair_date_permutations_1000"
description = "Run a 1000-sample date-label permutation diagnostic over the cap-250 cross-pair matrix."
argv = [
  "-m", "scripts.analyze_wrr_cross_pair_permutations",
  "--input", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "--permutations", "1000",
  "--seed", "1994",
  "--p1-threshold", "0.2",
  "--sample-output-limit", "-1",
  "--out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.csv",
  "--summary-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000_summary.csv",
  "--markdown-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.md",
  "--manifest-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.manifest.json",
]
inputs = [
  "scripts/analyze_wrr_cross_pair_permutations.py",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "els/wrr.py",
]
outputs = [
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000_summary.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.md",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000.manifest.json",
]

[[steps]]
id = "run_wrr2_cross_pair_date_permutations_no_wnp_999999"
description = "Run the repo-defined 999,999 date-label permutation diagnostic excluding WNP-dispute-flagged rows."
argv = [
  "-m", "scripts.analyze_wrr_cross_pair_permutations",
  "--input", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "--permutations", "999999",
  "--seed", "1994",
  "--p1-threshold", "0.2",
  "--exclude-pair-review-status", "diagnostic_exclusion_candidate_not_locked",
  "--sample-output-limit", "0",
  "--out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_observed_only.csv",
  "--summary-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_summary.csv",
  "--markdown-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999.md",
  "--manifest-out", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999.manifest.json",
]
inputs = [
  "scripts/analyze_wrr_cross_pair_permutations.py",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_corrected_distance_250.csv",
  "els/wrr.py",
]
outputs = [
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_observed_only.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_summary.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999.md",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999.manifest.json",
]

[[steps]]
id = "build_wrr_method_status_after_cross_pair"
description = "Refresh WRR method-status docs after cross-pair permutation outputs are current."
argv = [
  "-m", "scripts.build_wrr_method_status",
  "--text-source", "reports/wrr_1994/koren_genesis_text_source.csv",
  "--pair-summary", "reports/wrr_1994/wrr2_pair_table_reconciliation_summary.csv",
  "--defined-pair-summary", "reports/wrr_1994/wrr_defined_pair_set_audit_summary.csv",
  "--defined-gap-reasons", "reports/wrr_1994/wrr_defined_gap_reasons.csv",
  "--zero-hit-variant-summary", "reports/wrr_1994/wrr_zero_hit_variant_probe_summary.csv",
  "--table2-bridge-summary", "reports/wrr_1994/wrr_table2_source_bridge_summary.csv",
  "--table2-ocr-summary", "reports/wrr_1994/wrr_primary_table2_ocr_probe_summary.csv",
  "--table2-row-ocr-summary", "reports/wrr_1994/wrr_primary_table2_row_ocr_probe_summary.csv",
  "--skip-summary", "reports/wrr_1994/wrr2_skip_caps_summary.csv",
  "--corrected-distance-variants", "reports/wrr_1994/wrr2_corrected_distance_variant_comparison.csv",
  "--corrected-distance-aggregate", "reports/wrr_1994/wrr2_corrected_distance_aggregate.csv",
  "--cross-pair-permutation-summary", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000_summary.csv",
  "--cross-pair-recommended-permutation-summary", "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_summary.csv",
  "--primary-result-table", "reports/wrr_1994/wrr_primary_result_table.csv",
  "--out", "reports/wrr_1994/wrr_method_status.csv",
  "--markdown-out", "docs/WRR_METHOD_STATUS.md",
  "--manifest-out", "reports/wrr_1994/wrr_method_status.manifest.json",
]
inputs = [
  "scripts/build_wrr_method_status.py",
  "reports/wrr_1994/koren_genesis_text_source.csv",
  "reports/wrr_1994/wrr2_pair_table_reconciliation_summary.csv",
  "reports/wrr_1994/wrr_defined_pair_set_audit_summary.csv",
  "reports/wrr_1994/wrr_defined_gap_reasons.csv",
  "reports/wrr_1994/wrr_zero_hit_variant_probe_summary.csv",
  "reports/wrr_1994/wrr_table2_source_bridge_summary.csv",
  "reports/wrr_1994/wrr_primary_table2_ocr_probe_summary.csv",
  "reports/wrr_1994/wrr_primary_table2_row_ocr_probe_summary.csv",
  "reports/wrr_1994/wrr2_skip_caps_summary.csv",
  "reports/wrr_1994/wrr2_corrected_distance_variant_comparison.csv",
  "reports/wrr_1994/wrr2_corrected_distance_aggregate.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_1000_summary.csv",
  "reports/wrr_1994/cross_pair_grid/wrr2_cross_pair_permutations_no_wnp_999999_summary.csv",
  "reports/wrr_1994/wrr_primary_result_table.csv",
]
outputs = [
  "reports/wrr_1994/wrr_method_status.csv",
  "docs/WRR_METHOD_STATUS.md",
  "reports/wrr_1994/wrr_method_status.manifest.json",
]

[[steps]]
id = "check_wrr_claim_readiness_after_cross_pair"
description = "Refresh the WRR claim-readiness gate after method status is current."
argv = [
  "-m", "scripts.check_wrr_claim_readiness",
  "--status", "reports/wrr_1994/wrr_method_status.csv",
  "--out", "reports/wrr_1994/wrr_claim_readiness.csv",
  "--markdown-out", "docs/WRR_CLAIM_READINESS.md",
  "--manifest-out", "reports/wrr_1994/wrr_claim_readiness.manifest.json",
]
inputs = [
  "scripts/check_wrr_claim_readiness.py",
  "reports/wrr_1994/wrr_method_status.csv",
]
outputs = [
  "reports/wrr_1994/wrr_claim_readiness.csv",
  "docs/WRR_CLAIM_READINESS.md",
  "reports/wrr_1994/wrr_claim_readiness.manifest.json",
]
