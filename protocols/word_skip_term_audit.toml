argv = ["-m", "scripts.search_word_skip_terms", "--config", "configs/nonbible_hebrew_pby_brenner.toml", "--corpus-label", "HEB_BRENNER", "--terms", "terms/word_skip_term_audit_terms.csv", "--direction", "both", "--min-word-skip", "1", "--max-word-skip", "5", "--max-hits-per-term", "200", "--out", "reports/word_skip_terms/HEB_BRENNER_hits.csv"]
