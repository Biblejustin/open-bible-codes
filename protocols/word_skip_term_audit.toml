name = "word_skip_term_audit"
description = "Opt-in full word-token every-Kth-word audit for declared Hebrew phrases."
manifest_out = "reports/word_skip_terms/protocol_run.manifest.json"
max_parallel = 4
progress_interval_seconds = 15

[[steps]]
id = "search_mt_wlc"
description = "Search MT_WLC for full word-token skip phrases."
argv = ["-m", "scripts.search_word_skip_terms", "--config", "configs/example_oshb_wlc.toml", "--corpus-label", "MT_WLC", "--terms", "terms/word_skip_term_audit_terms.csv", "--direction", "both", "--min-word-skip", "1", "--max-word-skip", "5", "--max-hits-per-term", "200", "--out", "reports/word_skip_terms/MT_WLC_hits.csv"]
inputs = ["scripts/search_word_skip_terms.py", "els/corpus.py", "els/normalization.py", "configs/example_oshb_wlc.toml", "terms/word_skip_term_audit_terms.csv"]
outputs = ["reports/word_skip_terms/MT_WLC_hits.csv"]

[[steps]]
id = "search_uxlc"
description = "Search UXLC for full word-token skip phrases."
argv = ["-m", "scripts.search_word_skip_terms", "--config", "configs/example_uxlc.toml", "--corpus-label", "UXLC", "--terms", "terms/word_skip_term_audit_terms.csv", "--direction", "both", "--min-word-skip", "1", "--max-word-skip", "5", "--max-hits-per-term", "200", "--out", "reports/word_skip_terms/UXLC_hits.csv"]
inputs = ["scripts/search_word_skip_terms.py", "els/corpus.py", "els/normalization.py", "configs/example_uxlc.toml", "terms/word_skip_term_audit_terms.csv"]
outputs = ["reports/word_skip_terms/UXLC_hits.csv"]

