description = "Search UHB for full word-token skip phrases."
argv = ["-m", "scripts.search_word_skip_terms", "--config", "configs/example_uhb.toml", "--corpus-label", "UHB", "--terms", "terms/word_skip_term_audit_terms.csv", "--direction", "both", "--min-word-skip", "1", "--max-word-skip", "5", "--max-hits-per-term", "200", "--out", "reports/word_skip_terms/UHB_hits.csv"]
