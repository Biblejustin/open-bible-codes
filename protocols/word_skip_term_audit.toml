inputs = ["scripts/search_word_skip_terms.py", "els/corpus.py", "els/normalization.py", "configs/example_mam.toml", "terms/word_skip_term_audit_terms.csv"]
outputs = ["reports/word_skip_terms/MAM_hits.csv"]

