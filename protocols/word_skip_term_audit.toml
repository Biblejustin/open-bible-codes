[[steps]]
id = "summary"
description = "Summarize word-token skip audit hits."
argv = [
  "-m", "scripts.summarize_word_edge_patterns",
  "--hits", "reports/word_skip_terms/MT_WLC_hits.csv",
  "--hits", "reports/word_skip_terms/UXLC_hits.csv",
  "--hits", "reports/word_skip_terms/MAM_hits.csv",
  "--hits", "reports/word_skip_terms/EBIBLE_WLC_hits.csv",
  "--hits", "reports/word_skip_terms/UHB_hits.csv",
  "--hits", "reports/word_skip_terms/HEB_AHAD_HAAM_hits.csv",
  "--hits", "reports/word_skip_terms/HEB_BIALIK_hits.csv",
  "--hits", "reports/word_skip_terms/HEB_BRENNER_hits.csv",
  "--title", "Word-Skip Term Audit",
  "--description", "Opt-in full normalized surface-word token audit over declared Hebrew phrases.",
  "--cap-threshold", "200",
  "--summary-out", "reports/word_skip_terms/summary.csv",
  "--markdown-out", "docs/WORD_SKIP_TERM_AUDIT.md",
  "--manifest-out", "reports/word_skip_terms/summary.manifest.json"
]
inputs = [
  "scripts/summarize_word_edge_patterns.py",
  "els/term_display.py",
  "reports/word_skip_terms/MT_WLC_hits.csv",
  "reports/word_skip_terms/UXLC_hits.csv",
  "reports/word_skip_terms/MAM_hits.csv",
  "reports/word_skip_terms/EBIBLE_WLC_hits.csv",
  "reports/word_skip_terms/UHB_hits.csv",
  "reports/word_skip_terms/HEB_AHAD_HAAM_hits.csv",
  "reports/word_skip_terms/HEB_BIALIK_hits.csv",
  "reports/word_skip_terms/HEB_BRENNER_hits.csv",
]
outputs = ["reports/word_skip_terms/summary.csv", "docs/WORD_SKIP_TERM_AUDIT.md", "reports/word_skip_terms/summary.manifest.json"]
