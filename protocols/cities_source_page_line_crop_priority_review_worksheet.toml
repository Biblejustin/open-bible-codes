name = "cities_source_page_line_crop_priority_review_worksheet"
description = "Build a priority-ordered Cities source-page line-crop review worksheet without transcription."
manifest_out = "reports/cities_pdf_recovery_probe/source_page_line_crop_priority_review_worksheet_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_cities_source_page_line_crop_priority_review_worksheet"
description = "Join line-crop triage order and priority contact-sheet paths without source-row import."
argv = [
  "-m", "scripts.build_cities_source_page_line_crop_priority_review_worksheet",
  "--triage", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
  "--priority-contact", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.csv",
  "--out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet.csv",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet_summary.csv",
  "--markdown-out", "docs/CITIES_SOURCE_PAGE_LINE_CROP_PRIORITY_REVIEW_WORKSHEET.md",
  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_line_crop_priority_review_worksheet.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_triage.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_contact_sheet.csv",
]
outputs = [
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet_summary.csv",
  "docs/CITIES_SOURCE_PAGE_LINE_CROP_PRIORITY_REVIEW_WORKSHEET.md",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_priority_review_worksheet.manifest.json",
]
