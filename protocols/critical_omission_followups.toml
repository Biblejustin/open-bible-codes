name = "critical_omission_followups"
description = "Follow-up analyses on TR-vs-SBLGNT omission breaks."
manifest_out = "reports/protocols/critical_omission_followups/protocol_run.manifest.json"
max_parallel = 3
progress_interval_seconds = 30

[[steps]]
id = "critical_omission_breaks_reverse"
description = "Spliced TR-only blocks checked through the shared break engine."
argv = ["-m", "scripts.analyze_critical_omission_breaks_reverse"]
inputs = [
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
]
outputs = [
  "reports/critical_omission_breaks_reverse_summary.csv",
  "reports/critical_omission_breaks_reverse_examples.csv",
  "reports/critical_omission_breaks_reverse_by_verse.csv",
  "reports/critical_omission_breaks_reverse.manifest.json",
]
parallel_group = "followups"

[[steps]]
id = "critical_omission_breaks_cross_tradition"
description = "TR broken hits status in Majority/BYZ and TCG NT corpora."
argv = ["-m", "scripts.analyze_critical_omission_breaks_cross_tradition"]
inputs = [
  "reports/critical_omission_breaks_examples.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
]
outputs = [
  "reports/critical_omission_breaks_cross_tradition.csv",
  "reports/critical_omission_breaks_cross_tradition.manifest.json",
]
parallel_group = "followups"

[[steps]]
id = "critical_omission_breaks_null"
description = "1000-shuffle null distribution for actual omitted blocks."
argv = [
  "-m",
  "scripts.analyze_critical_omission_breaks_null",
  "--shuffles",
  "1000",
  "--seed",
  "1",
]
inputs = [
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
]
outputs = [
  "reports/critical_omission_breaks_null/null_distribution.csv",
  "reports/critical_omission_breaks_null/null_per_block.csv",
  "reports/critical_omission_breaks_null/summary.csv",
  "reports/critical_omission_breaks_null/manifest.json",
]

[[steps]]
id = "critical_omission_breaks_length_stratified"
description = "Per-term break rate normalized by total TR hits."
argv = ["-m", "scripts.analyze_critical_omission_breaks_length_stratified"]
inputs = [
  "reports/critical_omission_breaks_summary.csv",
  "configs/example_ebible_grctr.toml",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
]
outputs = [
  "reports/critical_omission_breaks_length_stratified.csv",
  "reports/critical_omission_breaks_length_stratified.manifest.json",
]
parallel_group = "followups"

