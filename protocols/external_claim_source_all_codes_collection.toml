name = "external_claim_source_all_codes_collection"
description = "Relaxed all-codes collection for external-source claim and critique term lists across Bible and secular-control corpora."
manifest_out = "reports/external_claim_source_all_codes/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 30

[[steps]]
id = "surface_all_codes"
description = "Retain every length-4+ external-source hidden-path row and annotate centered/surface context."
argv = [
  "-m",
  "els",
  "surface-context",
  "--terms",
  "terms/bible_code_digest_claim_terms.csv",
  "--terms",
  "terms/cri_els_critique_terms.csv",
  "--terms",
  "terms/thewordnotes_els_claim_terms.csv",
  "--terms",
  "terms/cosmic_codes_claim_terms.csv",
  "--terms",
  "terms/mark_tabata_isaiah53_claim_terms.csv",
  "--terms",
  "terms/bible_and_science_codes_terms.csv",
  "--terms",
  "terms/religions_wiki_scriptural_codes_terms.csv",
  "--terms",
  "terms/bible_codes_org_claim_terms.csv",
  "--corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus",
  "UXLC=configs/example_uxlc.toml",
  "--corpus",
  "MAM=configs/example_mam.toml",
  "--corpus",
  "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus",
  "UHB=configs/example_uhb.toml",
  "--corpus",
  "LXX=configs/example_ebible_grclxx.toml",
  "--corpus",
  "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus",
  "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus",
  "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--corpus",
  "SBLGNT=configs/example_sblgnt.toml",
  "--corpus",
  "KJV=configs/example_ebible_engkjv.toml",
  "--corpus",
  "KJVA=configs/example_ebible_engkjv_apocrypha.toml",
  "--corpus",
  "HEB_AHAD_HAAM=configs/nonbible_hebrew_pby_ahad_haam.toml",
  "--corpus",
  "HEB_BIALIK=configs/nonbible_hebrew_pby_bialik.toml",
  "--corpus",
  "HEB_BRENNER=configs/nonbible_hebrew_pby_brenner.toml",
  "--corpus",
  "GRK_ILIAD=configs/nonbible_greek_perseus_iliad.toml",
  "--corpus",
  "GRK_ODYSSEY=configs/nonbible_greek_perseus_odyssey.toml",
  "--corpus",
  "GRK_HERODOTUS=configs/nonbible_greek_perseus_herodotus.toml",
  "--corpus",
  "ENG_MOBY_DICK=configs/nonbible_english_pg_moby_dick.toml",
  "--corpus",
  "ENG_SHAKESPEARE=configs/nonbible_english_pg_shakespeare.toml",
  "--corpus",
  "ENG_WAR_AND_PEACE=configs/nonbible_english_pg_war_and_peace.toml",
  "--min-skip",
  "2",
  "--max-skip",
  "100",
  "--direction",
  "both",
  "--min-term-length",
  "4",
  "--jobs",
  "0",
  "--include-all",
  "--out",
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "--summary-out",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "--manifest-out",
  "reports/external_claim_source_all_codes/surface_all_codes.manifest.json",
]
inputs = [
  "terms/bible_code_digest_claim_terms.csv",
  "terms/cri_els_critique_terms.csv",
  "terms/thewordnotes_els_claim_terms.csv",
  "terms/cosmic_codes_claim_terms.csv",
  "terms/mark_tabata_isaiah53_claim_terms.csv",
  "terms/bible_and_science_codes_terms.csv",
  "terms/religions_wiki_scriptural_codes_terms.csv",
  "terms/bible_codes_org_claim_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_mam.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "configs/example_ebible_engkjv.toml",
  "configs/example_ebible_engkjv_apocrypha.toml",
  "configs/nonbible_hebrew_pby_ahad_haam.toml",
  "configs/nonbible_hebrew_pby_bialik.toml",
  "configs/nonbible_hebrew_pby_brenner.toml",
  "configs/nonbible_greek_perseus_iliad.toml",
  "configs/nonbible_greek_perseus_odyssey.toml",
  "configs/nonbible_greek_perseus_herodotus.toml",
  "configs/nonbible_english_pg_moby_dick.toml",
  "configs/nonbible_english_pg_shakespeare.toml",
  "configs/nonbible_english_pg_war_and_peace.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
  "els/surface.py",
]
outputs = [
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "reports/external_claim_source_all_codes/surface_all_codes.manifest.json",
]

[[steps]]
id = "summary"
description = "Summarize the external-source relaxed all-codes collection."
argv = [
  "-m",
  "scripts.summarize_surface_all_codes",
  "--hits",
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "--summary",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "--title",
  "External Claim Source All-Codes Collection",
  "--description",
  "This report keeps every length-4+ hidden-path ELS row from supplemental external-source claim and critique term lists across Bible and language-matched secular-control corpora. It is a collection index, not a claim-grade result.",
  "--markdown-out",
  "docs/EXTERNAL_CLAIM_SOURCE_ALL_CODES_COLLECTION.md",
  "--manifest-out",
  "reports/external_claim_source_all_codes/summary.manifest.json",
]
inputs = [
  "scripts/summarize_surface_all_codes.py",
  "els/term_display.py",
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
]
outputs = [
  "docs/EXTERNAL_CLAIM_SOURCE_ALL_CODES_COLLECTION.md",
  "reports/external_claim_source_all_codes/summary.manifest.json",
]

[[steps]]
id = "triage"
description = "Build a compact ranked triage queue from external-source relaxed all-codes rows."
argv = [
  "-m",
  "scripts.triage_surface_all_codes",
  "--hits",
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "--summary",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "--title",
  "External Claim Source All-Codes Triage",
  "--queue-out",
  "reports/external_claim_source_all_codes/triage_queue.csv",
  "--markdown-out",
  "docs/EXTERNAL_CLAIM_SOURCE_ALL_CODES_TRIAGE.md",
  "--manifest-out",
  "reports/external_claim_source_all_codes/triage.manifest.json",
]
inputs = [
  "scripts/triage_surface_all_codes.py",
  "els/term_display.py",
  "reports/external_claim_source_all_codes/surface_all_codes.csv",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
]
outputs = [
  "reports/external_claim_source_all_codes/triage_queue.csv",
  "docs/EXTERNAL_CLAIM_SOURCE_ALL_CODES_TRIAGE.md",
  "reports/external_claim_source_all_codes/triage.manifest.json",
]

[[steps]]
id = "findings"
description = "Build a concise findings layer from external-source counts, summary, and triage rows."
argv = [
  "-m",
  "scripts.build_external_claim_source_findings",
  "--counts-summary",
  "reports/external_claim_source_counts/summary.csv",
  "--all-codes-summary",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "--triage-queue",
  "reports/external_claim_source_all_codes/triage_queue.csv",
  "--markdown-out",
  "docs/EXTERNAL_CLAIM_SOURCE_FINDINGS.md",
  "--manifest-out",
  "reports/external_claim_source_all_codes/findings.manifest.json",
]
inputs = [
  "scripts/build_external_claim_source_findings.py",
  "els/term_display.py",
  "reports/external_claim_source_counts/summary.csv",
  "reports/external_claim_source_all_codes/surface_all_codes_summary.csv",
  "reports/external_claim_source_all_codes/triage_queue.csv",
]
outputs = [
  "docs/EXTERNAL_CLAIM_SOURCE_FINDINGS.md",
  "reports/external_claim_source_all_codes/findings.manifest.json",
]
