name = "torah_code_research_geometric_model"
description = "Simulate Torah-code.org research-program geometric and ELS level-1 compactness models."
manifest_out = "reports/torah_code_research_model/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "simulate_geometric_level1"
description = "Run model-design simulation for independent point sets vs moved-nearest-neighbor alternatives."
argv = [
  "-m",
  "scripts.simulate_torah_code_research_model",
  "--replicates",
  "200",
  "--out",
  "reports/torah_code_research_model/geometric_level1.csv",
  "--markdown-out",
  "docs/TORAH_CODE_RESEARCH_MODEL_SIMULATION.md",
  "--manifest-out",
  "reports/torah_code_research_model/manifest.json",
]
inputs = [
  "scripts/simulate_torah_code_research_model.py",
  "docs/WRR_SOURCE_AUDIT.md",
]
outputs = [
  "reports/torah_code_research_model/geometric_level1.csv",
  "docs/TORAH_CODE_RESEARCH_MODEL_SIMULATION.md",
  "reports/torah_code_research_model/manifest.json",
]

[[steps]]
id = "simulate_els_level1"
description = "Run ELS/cylinder analogue with resonant row-width distances and statistic-family comparison."
argv = [
  "-m",
  "scripts.simulate_torah_code_research_els_model",
  "--replicates",
  "200",
  "--out",
  "reports/torah_code_research_model/els_level1.csv",
  "--markdown-out",
  "docs/TORAH_CODE_RESEARCH_ELS_MODEL_SIMULATION.md",
  "--manifest-out",
  "reports/torah_code_research_model/els_manifest.json",
]
inputs = [
  "scripts/simulate_torah_code_research_els_model.py",
  "scripts/simulate_torah_code_research_model.py",
  "els/wrr.py",
  "docs/WRR_SOURCE_AUDIT.md",
]
outputs = [
  "reports/torah_code_research_model/els_level1.csv",
  "docs/TORAH_CODE_RESEARCH_ELS_MODEL_SIMULATION.md",
  "reports/torah_code_research_model/els_manifest.json",
]
