name = "public_baseline"
description = "Public-source baseline for MT WLC, LXX GRCLXX, TR GRCTR, and SBLGNT."
manifest_out = "reports/protocols/public_baseline/protocol_run.manifest.json"
max_parallel = 3
progress_interval_seconds = 15

[[steps]]
id = "bootstrap_public_sources"
description = "Download public source texts into ignored local data paths."
argv = ["-m", "scripts.bootstrap_public_sources"]
inputs = [
  "scripts/bootstrap_public_sources.py",
  "scripts/download_oshb_wlc.py",
  "scripts/download_uxlc.py",
  "scripts/download_mam.py",
  "scripts/download_ebible_hebwlc.py",
  "scripts/download_uhb.py",
  "scripts/download_sblgnt.py",
  "scripts/download_ebible_grclxx.py",
  "scripts/download_ebible_grctr.py",
  "scripts/download_ebible_grcmt.py",
  "scripts/download_ebible_grctcgnt.py",
]
outputs = [
  "data/raw/oshb/wlc",
  "data/raw/uxlc/books",
  "data/raw/mam/html",
  "data/processed/ebible/hebwlc.csv",
  "data/processed/unfoldingword/hbo_uhb.csv",
  "data/raw/sblgnt/text",
  "data/processed/ebible/grclxx.csv",
  "data/processed/ebible/grctr.csv",
  "data/processed/ebible/grcmt.csv",
  "data/processed/ebible/grctcgnt.csv",
]

[[steps]]
id = "batch_term_sets"
description = "Count all tracked term-set ELS hits across public corpora with one scan per corpus."
parallel_group = "analysis"
argv = [
  "-m", "els", "batch-many",
  "--term-set", "theological_terms=terms/theological_terms.csv",
  "--term-set", "modern_names_dates=terms/modern_names_dates.csv",
  "--term-set", "table_of_nations=terms/table_of_nations.csv",
  "--term-set", "prophetic_terms=terms/prophetic_terms.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "LXX=configs/example_ebible_grclxx.toml",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--min-skip", "2",
  "--max-skip", "50",
  "--jobs", "0",
  "--out-dir", "reports/protocols/public_baseline",
  "--manifest-out", "reports/protocols/public_baseline/batch_term_sets.manifest.json",
]
inputs = [
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
]
outputs = [
  "reports/protocols/public_baseline/theological_terms_counts.csv",
  "reports/protocols/public_baseline/theological_terms_counts.manifest.json",
  "reports/protocols/public_baseline/modern_names_dates_counts.csv",
  "reports/protocols/public_baseline/modern_names_dates_counts.manifest.json",
  "reports/protocols/public_baseline/table_of_nations_counts.csv",
  "reports/protocols/public_baseline/table_of_nations_counts.manifest.json",
  "reports/protocols/public_baseline/prophetic_terms_counts.csv",
  "reports/protocols/public_baseline/prophetic_terms_counts.manifest.json",
  "reports/protocols/public_baseline/batch_term_sets.manifest.json",
]

[[steps]]
id = "surface_context_nt"
description = "Find NT ELS hits whose center/span surface text discusses terms."
parallel_group = "analysis"
argv = [
  "-m", "els", "surface-context",
  "--terms", "terms/theological_terms.csv",
  "--terms", "terms/modern_names_dates.csv",
  "--terms", "terms/table_of_nations.csv",
  "--terms", "terms/prophetic_terms.csv",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--min-skip", "2",
  "--max-skip", "50",
  "--jobs", "0",
  "--out", "reports/protocols/public_baseline/surface_context_hits.csv",
  "--summary-out", "reports/protocols/public_baseline/surface_context_summary.csv",
  "--manifest-out", "reports/protocols/public_baseline/surface_context.manifest.json",
]
inputs = [
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
  "els/surface.py",
]
outputs = [
  "reports/protocols/public_baseline/surface_context_hits.csv",
  "reports/protocols/public_baseline/surface_context_summary.csv",
  "reports/protocols/public_baseline/surface_context.manifest.json",
]

[[steps]]
id = "word_counts"
description = "Count content words and multiple patterns across public corpora."
parallel_group = "analysis"
argv = ["-m", "scripts.analyze_word_counts"]
inputs = [
  "scripts/analyze_word_counts.py",
  "configs/example_oshb_wlc.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/critical.py",
  "els/word_counts.py",
]
outputs = [
  "reports/word_counts_by_word.csv",
  "reports/word_counts_by_book.csv",
  "reports/word_counts_by_chapter.csv",
  "reports/word_counts_by_verse.csv",
  "reports/word_count_multiples.csv",
  "reports/critical_word_multiples_breaks.csv",
  "reports/word_counts.manifest.json",
]

[[steps]]
id = "els_controls"
description = "Compare observed ELS counts with shuffled-letter and shuffled-term controls."
parallel_group = "analysis"
argv = [
  "-m", "scripts.analyze_els_controls",
  "--letter-shuffles", "3",
  "--term-shuffles", "25",
  "--jobs", "0",
  "--progress",
]
inputs = [
  "scripts/analyze_els_controls.py",
  "els/statistics.py",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
  "els/stats.py",
]
outputs = [
  "reports/els_controls_summary.csv",
  "reports/els_controls_examples.csv",
  "reports/els_controls.manifest.json",
]

[[steps]]
id = "critical_surface_variants"
