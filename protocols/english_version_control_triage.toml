name = "english_version_control_triage"
description = "Compare BibleGateway-overlap English versions against merged open English controls and inspect strongest contexts."
manifest_out = "reports/english_version_control_triage/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "triage"
description = "Rank target-vs-merged-control English term presence."
argv = [
  "-m", "scripts.triage_english_version_controls",
]
inputs = [
  "reports/biblegateway_english_versions/version_presence.csv",
  "reports/ebible_english_controls/version_presence.csv",
  "reports/door43_english_controls/version_presence.csv",
  "reports/oet_english_controls/version_presence.csv",
  "reports/otb_english_controls/version_presence.csv",
  "reports/openbible_english_controls/version_presence.csv",
  "reports/biblegateway_english_versions/included_versions.csv",
  "reports/ebible_english_controls/included_versions.csv",
  "reports/door43_english_controls/included_versions.csv",
  "reports/oet_english_controls/included_versions.csv",
  "reports/otb_english_controls/included_versions.csv",
  "reports/openbible_english_controls/included_versions.csv",
  "scripts/triage_english_version_controls.py",
]
outputs = [
  "reports/english_version_control_triage/triage.csv",
  "reports/english_version_control_triage/triage.md",
  "reports/english_version_control_triage/context_seed_terms.csv",
  "reports/english_version_control_triage/triage.manifest.json",
]

[[steps]]
id = "context_export"
description = "Export top seed-term target-version hit contexts."
argv = [
  "-m", "els", "surface-context",
  "--terms", "reports/english_version_control_triage/context_seed_terms.csv",
  "--corpus", "ASV=configs/example_ebible_engasv.toml",
  "--corpus", "DARBY=configs/example_ebible_engdby.toml",
  "--corpus", "DRA=configs/example_ebible_engdra.toml",
  "--corpus", "ERV=configs/example_ebible_engerv.toml",
  "--corpus", "GNV=configs/example_ebible_enggnv.toml",
  "--corpus", "GW=configs/example_ebible_enggw.toml",
  "--corpus", "KJV=configs/example_ebible_engkjv.toml",
  "--corpus", "NET=configs/example_ebible_engnet.toml",
  "--corpus", "OJB=configs/example_ebible_engojb.toml",
  "--corpus", "WEB=configs/example_ebible_engweb.toml",
  "--corpus", "WYC=configs/example_ebible_engwycliffe.toml",
  "--corpus", "YLT=configs/example_ebible_engylt.toml",
  "--min-skip", "2",
  "--max-skip", "100",
  "--direction", "both",
  "--min-term-length", "4",
  "--jobs", "4",
  "--max-hits-per-term", "25",
  "--include-all",
  "--out", "reports/english_version_control_triage/context_hits.csv",
  "--summary-out", "reports/english_version_control_triage/context_summary.csv",
  "--manifest-out", "reports/english_version_control_triage/context.manifest.json",
]
inputs = [
  "reports/english_version_control_triage/context_seed_terms.csv",
  "configs/example_ebible_engasv.toml",
  "configs/example_ebible_engdby.toml",
  "configs/example_ebible_engdra.toml",
  "configs/example_ebible_engerv.toml",
  "configs/example_ebible_enggnv.toml",
  "configs/example_ebible_enggw.toml",
  "configs/example_ebible_engkjv.toml",
  "configs/example_ebible_engnet.toml",
  "configs/example_ebible_engojb.toml",
  "configs/example_ebible_engweb.toml",
  "configs/example_ebible_engwycliffe.toml",
  "configs/example_ebible_engylt.toml",
]
outputs = [
  "reports/english_version_control_triage/context_hits.csv",
  "reports/english_version_control_triage/context_summary.csv",
  "reports/english_version_control_triage/context.manifest.json",
]

[[steps]]
id = "context_review"
description = "Summarize context-export gate results."
argv = [
  "-m", "scripts.build_english_version_context_review",
]
inputs = [
  "reports/english_version_control_triage/triage.csv",
  "reports/english_version_control_triage/context_summary.csv",
  "reports/english_version_control_triage/context_hits.csv",
  "scripts/build_english_version_context_review.py",
]
outputs = [
  "reports/english_version_control_triage/context_review.md",
  "reports/english_version_control_triage/context_review.manifest.json",
]
