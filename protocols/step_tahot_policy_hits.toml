name = "step_tahot_policy_hits"
description = "Audit STEP_TAHOT-only exact-hit rows against TAHOT source-type policy."
manifest_out = "reports/step_tahot_policy_hits/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 0

[[steps]]
id = "screening_step_tahot_presence"
description = "Refresh broader STEP_TAHOT screening version-presence rows."
argv = [
  "-m", "scripts.analyze_hit_version_presence",
  "--language", "hebrew",
  "--terms", "terms/theological_terms.csv",
  "--terms", "terms/modern_names_dates.csv",
  "--terms", "terms/table_of_nations.csv",
  "--terms", "terms/prophetic_terms.csv",
  "--terms", "terms/hebrew_claim_terms.csv",
  "--terms", "terms/biblical_tribes.csv",
  "--terms", "terms/biblical_festivals.csv",
  "--terms", "terms/biblical_calendar.csv",
  "--all-concepts",
  "--duplicate-term-id", "first",
  "--report-title", "Hebrew Screening Version Presence With STEP TAHOT",
  "--max-hits-per-term", "50",
  "--corpus-jobs", "0",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--corpus", "STEP_TAHOT=configs/example_step_tahot.toml",
  "--patterns-out", "reports/step_tahot_screening_version_presence/hit_patterns.csv",
  "--summary-out", "reports/step_tahot_screening_version_presence/term_summary.csv",
  "--markdown-out", "reports/step_tahot_screening_version_presence/step_tahot_screening_version_presence.md",
  "--manifest-out", "reports/step_tahot_screening_version_presence/manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/theological_terms.csv",
  "terms/modern_names_dates.csv",
  "terms/table_of_nations.csv",
  "terms/prophetic_terms.csv",
  "terms/hebrew_claim_terms.csv",
  "terms/biblical_tribes.csv",
  "terms/biblical_festivals.csv",
  "terms/biblical_calendar.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "configs/example_step_tahot.toml",
  "data/processed/step/tahot.csv",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/step_tahot_screening_version_presence/hit_patterns.csv",
  "reports/step_tahot_screening_version_presence/term_summary.csv",
  "reports/step_tahot_screening_version_presence/step_tahot_screening_version_presence.md",
  "reports/step_tahot_screening_version_presence/manifest.json",
]

[[steps]]
id = "audit_step_tahot_policy_hits"
description = "Classify STEP_TAHOT-only rows by TAHOT word source-type path."
argv = ["-m", "scripts.analyze_step_tahot_policy_hits"]
inputs = [
  "scripts/analyze_step_tahot_policy_hits.py",
  "reports/step_tahot_screening_version_presence/hit_patterns.csv",
  "data/processed/step/tahot.csv",
  "configs/example_step_tahot.toml",
  "els/corpus.py",
]
outputs = [
  "reports/step_tahot_policy_hits/step_tahot_only_policy_hits.csv",
  "reports/step_tahot_policy_hits/summary.csv",
  "reports/step_tahot_policy_hits/step_tahot_policy_hits.md",
  "reports/step_tahot_policy_hits/manifest.json",
]
