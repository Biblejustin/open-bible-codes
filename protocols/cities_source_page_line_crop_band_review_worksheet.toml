name = "cities_source_page_line_crop_band_review_worksheet"
description = "Build a no-input Cities source-page line-crop band review worksheet."
manifest_out = "reports/cities_pdf_recovery_probe/source_page_line_crop_band_review_worksheet_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "build_cities_source_page_line_crop_band_review_worksheet"
description = "Build a 16-row coordinate-band worksheet without source-row import."
argv = [
  "-m", "scripts.build_cities_source_page_line_crop_band_review_worksheet",
  "--band-map", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_map.csv",
  "--out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet.csv",
  "--summary-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet_summary.csv",
  "--markdown-out", "docs/CITIES_SOURCE_PAGE_LINE_CROP_BAND_REVIEW_WORKSHEET.md",
  "--manifest-out", "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet.manifest.json",
]
inputs = [
  "scripts/build_cities_source_page_line_crop_band_review_worksheet.py",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_map.csv",
]
outputs = [
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet.csv",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet_summary.csv",
  "docs/CITIES_SOURCE_PAGE_LINE_CROP_BAND_REVIEW_WORKSHEET.md",
  "reports/cities_pdf_recovery_probe/cities_source_page_line_crop_band_review_worksheet.manifest.json",
]
