name = "compound_extension_prospective"
description = "Locked Hebrew Gospel/genealogy clean-lock exact-version and representative-control screen."
manifest_out = "reports/compound_extension_prospective/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "version_presence"
description = "Compare exact hebrew gospel/genealogy prospective ELS ref-key patterns across MT-family corpora."
argv = [
  "-m",
  "scripts.analyze_hit_version_presence",
  "--language",
  "hebrew",
  "--terms",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "--all-concepts",
  "--report-title",
  "Hebrew Gospel/Genealogy Prospective Version Presence",
  "--max-hits-per-term",
  "0",
  "--min-term-length",
  "4",
  "--min-skip",
  "2",
  "--max-skip",
  "100",
  "--direction",
  "both",
  "--corpus-jobs",
  "0",
  "--corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus",
  "UXLC=configs/example_uxlc.toml",
  "--corpus",
  "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus",
  "MAM=configs/example_mam.toml",
  "--corpus",
  "UHB=configs/example_uhb.toml",
  "--patterns-out",
  "reports/compound_extension_prospective/hit_patterns.csv",
  "--summary-out",
  "reports/compound_extension_prospective/term_summary.csv",
  "--markdown-out",
  "reports/compound_extension_prospective/version_presence.md",
  "--manifest-out",
  "reports/compound_extension_prospective/version_presence.manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/compound_extension_prospective/hit_patterns.csv",
  "reports/compound_extension_prospective/term_summary.csv",
  "reports/compound_extension_prospective/version_presence.md",
  "reports/compound_extension_prospective/version_presence.manifest.json",
]

[[steps]]
id = "control_targets"
description = "Build representative MT_WLC/UHB control targets from exact version-presence rows."
argv = [
  "-m",
  "scripts.analyze_targeted_version_presence",
  "--all-exact-term-ids",
  "--terms",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "--hebrew-summary",
  "reports/compound_extension_prospective/term_summary.csv",
  "--hebrew-patterns",
  "reports/compound_extension_prospective/hit_patterns.csv",
  "--greek-summary",
  "reports/compound_extension_prospective/no_greek_summary.csv",
  "--greek-patterns",
  "reports/compound_extension_prospective/no_greek_patterns.csv",
  "--paired-controls",
  "reports/compound_extension_prospective/no_paired_controls.csv",
  "--extension-summary",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "--extension-summary",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "--extension-top",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "--extension-top",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "--summary-out",
  "reports/compound_extension_prospective/initial_summary.csv",
  "--examples-out",
  "reports/compound_extension_prospective/initial_examples.csv",
  "--control-targets-out",
  "reports/compound_extension_prospective/control_targets.csv",
  "--markdown-out",
  "reports/compound_extension_prospective/initial.md",
  "--markdown-title",
  "Hebrew Gospel/Genealogy Prospective Initial Review",
  "--markdown-description",
  "This generated report joins exact version-presence summaries and bounded phrase-extension rows for the locked hebrew gospel/genealogy prospective cohort before representative controls are run.",
  "--manifest-out",
  "reports/compound_extension_prospective/control_targets.manifest.json",
]
inputs = [
  "scripts/analyze_targeted_version_presence.py",
  "els/term_display.py",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "reports/compound_extension_prospective/term_summary.csv",
  "reports/compound_extension_prospective/hit_patterns.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
]
outputs = [
  "reports/compound_extension_prospective/initial_summary.csv",
  "reports/compound_extension_prospective/initial_examples.csv",
  "reports/compound_extension_prospective/control_targets.csv",
  "reports/compound_extension_prospective/initial.md",
  "reports/compound_extension_prospective/control_targets.manifest.json",
]

[[steps]]
id = "paired_controls"
description = "Run 1000+1000 representative paired controls for nonzero MT_WLC/UHB target rows."
argv = [
  "-m",
  "scripts.analyze_targeted_paired_controls",
  "--target-summary",
  "reports/compound_extension_prospective/control_targets.csv",
  "--target-corpus",
  "MT_WLC",
  "--target-corpus",
  "UHB",
  "--min-skip",
  "2",
  "--max-skip",
  "100",
  "--term-shuffle-samples",
  "1000",
  "--random-samples",
  "1000",
  "--jobs",
  "0",
  "--summary-out",
  "reports/compound_extension_prospective/paired_controls_summary.csv",
  "--examples-out",
  "reports/compound_extension_prospective/paired_controls_examples.csv",
  "--markdown-out",
  "reports/compound_extension_prospective/paired_controls.md",
  "--manifest-out",
  "reports/compound_extension_prospective/paired_controls.manifest.json",
]
inputs = [
  "reports/compound_extension_prospective/control_targets.csv",
  "scripts/analyze_targeted_paired_controls.py",
  "els/statistics.py",
  "configs/example_oshb_wlc.toml",
  "configs/example_uhb.toml",
  "els/corpus.py",
  "els/search.py",
  "els/stats.py",
]
outputs = [
  "reports/compound_extension_prospective/paired_controls_summary.csv",
  "reports/compound_extension_prospective/paired_controls_examples.csv",
  "reports/compound_extension_prospective/paired_controls.md",
  "reports/compound_extension_prospective/paired_controls.manifest.json",
]

[[steps]]
id = "controlled_report"
description = "Regenerate the locked hebrew gospel/genealogy prospective report with representative paired controls joined back in."
argv = [
  "-m",
  "scripts.analyze_targeted_version_presence",
  "--all-exact-term-ids",
  "--terms",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "--hebrew-summary",
  "reports/compound_extension_prospective/term_summary.csv",
  "--hebrew-patterns",
  "reports/compound_extension_prospective/hit_patterns.csv",
  "--greek-summary",
  "reports/compound_extension_prospective/no_greek_summary.csv",
  "--greek-patterns",
  "reports/compound_extension_prospective/no_greek_patterns.csv",
  "--paired-controls",
  "reports/compound_extension_prospective/no_paired_controls.csv",
  "--representative-controls",
  "reports/compound_extension_prospective/paired_controls_summary.csv",
  "--extension-summary",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "--extension-summary",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "--extension-top",
  "MT_WLC=reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "--extension-top",
  "UHB=reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
  "--summary-out",
  "reports/compound_extension_prospective/controlled_summary.csv",
  "--examples-out",
  "reports/compound_extension_prospective/controlled_examples.csv",
  "--control-targets-out",
  "reports/compound_extension_prospective/controlled_control_targets.csv",
  "--markdown-out",
  "docs/COMPOUND_EXTENSION_PROSPECTIVE_REPORT.md",
  "--markdown-title",
  "Hebrew Gospel/Genealogy Prospective Report",
  "--markdown-description",
  "This generated report joins exact version-presence summaries, representative paired controls, and bounded phrase-extension rows for the locked hebrew gospel/genealogy prospective cohort. It is review material, not conclusive evidence of meaning.",
  "--manifest-out",
  "reports/compound_extension_prospective/controlled_report.manifest.json",
]
inputs = [
  "scripts/analyze_targeted_version_presence.py",
  "els/term_display.py",
  "terms/compound_extension_prospective_terms_clean_lock.csv",
  "reports/compound_extension_prospective/term_summary.csv",
  "reports/compound_extension_prospective/hit_patterns.csv",
  "reports/compound_extension_prospective/paired_controls_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_summary.csv",
  "reports/version_presence_extensions/extensions_hebrew_mt_wlc_top.csv",
  "reports/version_presence_extensions/extensions_hebrew_uhb_top.csv",
]
outputs = [
  "reports/compound_extension_prospective/controlled_summary.csv",
  "reports/compound_extension_prospective/controlled_examples.csv",
  "reports/compound_extension_prospective/controlled_control_targets.csv",
  "docs/COMPOUND_EXTENSION_PROSPECTIVE_REPORT.md",
  "reports/compound_extension_prospective/controlled_report.manifest.json",
]
