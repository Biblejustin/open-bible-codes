name = "dynamic_skip_focus_counts"
description = "Full-distance dynamic-skip counts for selected Hebrew, Greek, and English focus terms."
manifest_out = "reports/dynamic_skip_focus/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 30

[[steps]]
id = "hebrew_dynamic_letters_per_term_counts"
description = "Count Hebrew focus terms across MT-family corpora with max skip = floor(corpus letters / term letters)."
argv = [
  "scripts/run_dynamic_span_counter.py",
  "--terms", "terms/dynamic_skip_focus_terms.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--min-skip", "2",
  "--mode", "letters-per-term",
  "--direction", "both",
  "--out", "reports/dynamic_skip_focus/hebrew_pair_counts.csv",
  "--manifest-out", "reports/dynamic_skip_focus/hebrew_pair_counts.manifest.json",
]
inputs = [
  "terms/dynamic_skip_focus_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_mam.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_uhb.toml",
  "scripts/run_dynamic_span_counter.py",
  "scripts/cpp/dynamic_span_counter.cpp",
  "els/search.py",
  "els/corpus.py",
]
outputs = [
  "reports/dynamic_skip_focus/hebrew_pair_counts.csv",
  "reports/dynamic_skip_focus/hebrew_pair_counts.manifest.json",
]

[[steps]]
id = "hebrew_dynamic_full_span_counts"
description = "Count Hebrew focus terms across MT-family corpora with the largest skip where each term still fits in the corpus."
argv = [
  "scripts/run_dynamic_span_counter.py",
  "--terms", "terms/dynamic_skip_focus_terms.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--min-skip", "2",
  "--mode", "full-span",
  "--direction", "both",
  "--out", "reports/dynamic_skip_focus/hebrew_full_span_pair_counts.csv",
  "--manifest-out", "reports/dynamic_skip_focus/hebrew_full_span_pair_counts.manifest.json",
]
inputs = [
  "terms/dynamic_skip_focus_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_mam.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_uhb.toml",
  "scripts/run_dynamic_span_counter.py",
  "scripts/cpp/dynamic_span_counter.cpp",
  "els/search.py",
  "els/corpus.py",
]
outputs = [
  "reports/dynamic_skip_focus/hebrew_full_span_pair_counts.csv",
  "reports/dynamic_skip_focus/hebrew_full_span_pair_counts.manifest.json",
]

