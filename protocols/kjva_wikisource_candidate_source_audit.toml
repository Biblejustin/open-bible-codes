name = "kjva_wikisource_candidate_source_audit"
description = "Audit Wikisource Ballantyne KJV + Apocrypha as a metadata-only future KJVA source candidate."
manifest_out = "reports/kjva_wikisource_candidate_source/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "kjva_wikisource_candidate_source_audit"
description = "Record source-status metadata without importing or committing Bible text."
argv = ["-m", "scripts.analyze_kjva_wikisource_candidate_source"]
inputs = [
  "scripts/analyze_kjva_wikisource_candidate_source.py",
]
outputs = [
  "reports/kjva_wikisource_candidate_source/source_status.csv",
  "reports/kjva_wikisource_candidate_source/summary.csv",
  "reports/kjva_wikisource_candidate_source/anchors.csv",
  "docs/KJVA_WIKISOURCE_CANDIDATE_SOURCE_AUDIT.md",
  "reports/kjva_wikisource_candidate_source/manifest.json",
]
