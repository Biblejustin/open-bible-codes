name = "greek_nt_claim_version_presence"
description = "Capped exact ELS hit-pattern presence for Greek NT claim terms across Greek NT corpora."
manifest_out = "reports/greek_nt_claim_version_presence/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 0

[[steps]]
id = "greek_nt_claim_version_presence"
description = "Compare exact Greek NT claim-term hit ref-key patterns across TR_NT, BYZ_NT, TCG_NT, and SBLGNT."
argv = [
  "-m",
  "scripts.analyze_hit_version_presence",
  "--language",
  "greek",
  "--terms",
  "terms/greek_nt_claim_terms.csv",
  "--all-concepts",
  "--no-stable-family",
  "--stable-family-name",
  "configured-family",
  "--report-title",
  "Greek NT Claim Version Presence",
  "--max-hits-per-term",
  "100",
  "--corpus-jobs",
  "0",
  "--corpus",
  "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus",
  "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus",
  "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--corpus",
  "SBLGNT=configs/example_sblgnt.toml",
  "--patterns-out",
  "reports/greek_nt_claim_version_presence/hit_patterns.csv",
  "--summary-out",
  "reports/greek_nt_claim_version_presence/term_summary.csv",
  "--markdown-out",
  "reports/greek_nt_claim_version_presence/greek_nt_claim_version_presence.md",
  "--manifest-out",
  "reports/greek_nt_claim_version_presence/manifest.json",
]
inputs = [
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "els/term_display.py",
  "terms/greek_nt_claim_terms.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/greek_nt_claim_version_presence/hit_patterns.csv",
  "reports/greek_nt_claim_version_presence/term_summary.csv",
  "reports/greek_nt_claim_version_presence/greek_nt_claim_version_presence.md",
  "reports/greek_nt_claim_version_presence/manifest.json",
]
