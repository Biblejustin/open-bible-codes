outputs = [
  "reports/external_claim_source_counts/bible_code_digest_claim_terms_counts.csv",
  "reports/external_claim_source_counts/bible_code_digest_claim_terms_counts.manifest.json",
  "reports/external_claim_source_counts/cri_els_critique_terms_counts.csv",
  "reports/external_claim_source_counts/cri_els_critique_terms_counts.manifest.json",
  "reports/external_claim_source_counts/thewordnotes_els_claim_terms_counts.csv",
  "reports/external_claim_source_counts/thewordnotes_els_claim_terms_counts.manifest.json",
  "reports/external_claim_source_counts/cosmic_codes_claim_terms_counts.csv",
  "reports/external_claim_source_counts/cosmic_codes_claim_terms_counts.manifest.json",
  "reports/external_claim_source_counts/mark_tabata_isaiah53_claim_terms_counts.csv",
  "reports/external_claim_source_counts/mark_tabata_isaiah53_claim_terms_counts.manifest.json",
  "reports/external_claim_source_counts/bible_and_science_codes_terms_counts.csv",
  "reports/external_claim_source_counts/bible_and_science_codes_terms_counts.manifest.json",
  "reports/external_claim_source_counts/religions_wiki_scriptural_codes_terms_counts.csv",
  "reports/external_claim_source_counts/religions_wiki_scriptural_codes_terms_counts.manifest.json",
  "reports/external_claim_source_counts/bible_codes_org_claim_terms_counts.csv",
  "reports/external_claim_source_counts/bible_codes_org_claim_terms_counts.manifest.json",
  "reports/external_claim_source_counts/broad_search.manifest.json",
