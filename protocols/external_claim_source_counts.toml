name = "external_claim_source_counts"
description = "Count external-source claim and critique term lists across Bible corpora and language-matched secular controls."
manifest_out = "reports/external_claim_source_counts/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 30

[[steps]]
id = "external_claim_source_counts"
description = "Count supplemental claim/source-audit term lists with skip 2..100."
argv = [
  "-m", "els", "batch-many",
  "--term-set", "bible_code_digest_claim_terms=terms/bible_code_digest_claim_terms.csv",
  "--term-set", "cri_els_critique_terms=terms/cri_els_critique_terms.csv",
  "--term-set", "thewordnotes_els_claim_terms=terms/thewordnotes_els_claim_terms.csv",
  "--term-set", "cosmic_codes_claim_terms=terms/cosmic_codes_claim_terms.csv",
  "--term-set", "mark_tabata_isaiah53_claim_terms=terms/mark_tabata_isaiah53_claim_terms.csv",
  "--term-set", "bible_and_science_codes_terms=terms/bible_and_science_codes_terms.csv",
  "--term-set", "religions_wiki_scriptural_codes_terms=terms/religions_wiki_scriptural_codes_terms.csv",
  "--term-set", "bible_codes_org_claim_terms=terms/bible_codes_org_claim_terms.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--corpus", "LXX=configs/example_ebible_grclxx.toml",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus", "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--corpus", "KJV=configs/example_ebible_engkjv.toml",
  "--corpus", "KJVA=configs/example_ebible_engkjv_apocrypha.toml",
  "--corpus", "HEB_AHAD_HAAM=configs/nonbible_hebrew_pby_ahad_haam.toml",
  "--corpus", "HEB_BIALIK=configs/nonbible_hebrew_pby_bialik.toml",
  "--corpus", "HEB_BRENNER=configs/nonbible_hebrew_pby_brenner.toml",
  "--corpus", "GRK_ILIAD=configs/nonbible_greek_perseus_iliad.toml",
  "--corpus", "GRK_ODYSSEY=configs/nonbible_greek_perseus_odyssey.toml",
