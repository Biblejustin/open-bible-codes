  "--corpus", "ENG_SHAKESPEARE=configs/nonbible_english_pg_shakespeare.toml",
  "--corpus", "ENG_WAR_AND_PEACE=configs/nonbible_english_pg_war_and_peace.toml",
  "--min-skip", "2",
  "--max-skip", "100",
  "--jobs", "0",
  "--out-dir", "reports/external_claim_source_counts",
  "--manifest-out", "reports/external_claim_source_counts/broad_search.manifest.json",
]
inputs = [
  "terms/bible_code_digest_claim_terms.csv",
  "terms/cri_els_critique_terms.csv",
  "terms/thewordnotes_els_claim_terms.csv",
  "terms/cosmic_codes_claim_terms.csv",
