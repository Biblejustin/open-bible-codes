[[steps]]
id = "external_claim_source_report"
description = "Summarize external-source supplemental term counts."
argv = [
  "-m", "scripts.analyze_broad_search",
  "--counts-dir", "reports/external_claim_source_counts",
  "--baseline-dir", "reports/external_claim_source_counts/no_baseline",
  "--title", "External Claim Source Count Summary",
  "--scope-line", "Count sweep for supplemental claim, critique, and methodology term lists gathered from external Bible-code sources.",
  "--main-read", "Supplemental source-audit term lists now have measured skip 2..100 count baselines across Bible corpora and language-matched secular controls.",
  "--main-read", "The largest rows are short or common forms, and several are larger in secular Hebrew controls than in Bible corpora.",
  "--main-read", "This run screens source-derived terms only; reproducing a claim still requires the source's exact spelling, skip geometry, row width, proximity metric, and controls.",
  "--main-read", "Non-Bible controls are included here as immediate background, not as final matched-control statistics.",
  "--summary-out", "reports/external_claim_source_counts/summary.csv",
  "--top-out", "reports/external_claim_source_counts/top_counts.csv",
  "--focus-out", "reports/external_claim_source_counts/focus.csv",
  "--delta-out", "reports/external_claim_source_counts/delta_vs_baseline.csv",
  "--markdown-out", "reports/external_claim_source_counts/summary.md",
  "--docs-out", "docs/EXTERNAL_CLAIM_SOURCE_COUNTS.md",
  "--manifest-out", "reports/external_claim_source_counts/summary.manifest.json",
]
inputs = [
  "scripts/analyze_broad_search.py",
  "els/term_display.py",
  "reports/external_claim_source_counts/bible_code_digest_claim_terms_counts.csv",
  "reports/external_claim_source_counts/cri_els_critique_terms_counts.csv",
  "reports/external_claim_source_counts/thewordnotes_els_claim_terms_counts.csv",
  "reports/external_claim_source_counts/cosmic_codes_claim_terms_counts.csv",
  "reports/external_claim_source_counts/mark_tabata_isaiah53_claim_terms_counts.csv",
  "reports/external_claim_source_counts/bible_and_science_codes_terms_counts.csv",
  "reports/external_claim_source_counts/religions_wiki_scriptural_codes_terms_counts.csv",
  "reports/external_claim_source_counts/bible_codes_org_claim_terms_counts.csv",
  "reports/external_claim_source_counts/broad_search.manifest.json",
]
outputs = [
  "reports/external_claim_source_counts/summary.csv",
  "reports/external_claim_source_counts/top_counts.csv",
  "reports/external_claim_source_counts/focus.csv",
  "reports/external_claim_source_counts/delta_vs_baseline.csv",
  "reports/external_claim_source_counts/summary.md",
  "docs/EXTERNAL_CLAIM_SOURCE_COUNTS.md",
  "reports/external_claim_source_counts/summary.manifest.json",
]
