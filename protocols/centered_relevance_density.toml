[[steps]]
id = "crd_density"
description = "Run deterministic CRD density over the locked Gog/Magog relevance dictionary."
argv = ["-m", "scripts.run_crd_density", "protocols/centered_relevance_density.toml", "--resume"]
inputs = [
  "terms/gog_magog_pair_prospective_terms.csv",
  "terms/relevance_dictionary.toml",
  "docs/CRD_PREREGISTRATION.md",
  "scripts/run_crd_density.py",
  "scripts/classify_centered_relevance.py",
]
outputs = [
  "reports/crd/density_matrix.csv",
  "reports/crd/classified_hits.csv",
  "reports/crd/manifest.json",
]

[[steps]]
id = "crd_comparison"
description = "Build CRD comparison summaries and tracked Markdown report."
argv = ["-m", "scripts.build_crd_comparison"]
inputs = [
  "reports/crd/density_matrix.csv",
  "reports/crd/classified_hits.csv",
  "reports/crd/manifest.json",
  "scripts/build_crd_comparison.py",
]
outputs = [
  "reports/crd/per_term_rankings.csv",
  "reports/crd/bible_vs_control_summary.csv",
  "reports/crd/edition_meta_summary.csv",
  "reports/crd/classifier_agreement_summary.csv",
  "docs/CRD_REPORT.md",
]
