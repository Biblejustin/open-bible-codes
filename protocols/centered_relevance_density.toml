name = "centered_relevance_density"
description = "Locked deterministic Centered-Relevance Density run for the Gog/Magog prospective Hebrew cohort."
manifest_out = "reports/crd/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

term_file = "terms/gog_magog_pair_prospective_terms.csv"
relevance_dictionary = "terms/relevance_dictionary.toml"
relevance_dictionary_sha256 = "a6406048b9953ca50715d99100994b9065394d9db31b35867666d365a3bd0f99"
skip_range = "2..100"
direction = "both"
min_term_length = 3
max_hits_per_term = 200
classifier_mode = "deterministic"
llm_model = "gpt-5"
llm_model_version = "gpt-5"
llm_provider = "openai"
system_prompt_path = "prompts/crd_classifier_v1/system.md"
system_prompt_sha256 = "403bd5c4a48e45824bd895c15f43753f7a83f16c82fa89ea5e67d60e67297619"
user_prompt_template_path = "prompts/crd_classifier_v1/user_template.md"
user_prompt_template_sha256 = "6af9bc5cca43ee6688e4f83b332ed3488d77db309968a848dabcedde95865309"
llm_temperature = 0
llm_max_tokens = 200
max_api_calls = 0
max_estimated_cost_usd = 0
estimated_cost_per_call_usd = 0
output_dir = "reports/crd"
preregistration_doc = "docs/CRD_PREREGISTRATION.md"
preregistration_sha256 = "71388e327d6f9598b44a86f7a353c87864df7ef7693b61c1109373ee38670d3e"

