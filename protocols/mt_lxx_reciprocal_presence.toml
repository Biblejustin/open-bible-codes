name = "mt_lxx_reciprocal_presence"
description = "Compare concept-level ELS presence between MT Hebrew and LXX Greek at aligned verse/chapter loci."
manifest_out = "reports/mt_lxx_reciprocal_presence/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "mt_lxx_reciprocal_presence"
description = "Run reciprocal MT/LXX concept-level ELS presence comparison over declared Hebrew/Greek paired concepts."
argv = [
  "-m",
  "scripts.analyze_mt_lxx_reciprocal_presence",
  "--terms",
  "terms/theological_terms.csv",
  "--terms",
  "terms/prophetic_terms.csv",
  "--terms",
  "terms/biblical_tribes.csv",
  "--terms",
  "terms/biblical_festivals.csv",
  "--terms",
  "terms/biblical_calendar.csv",
  "--terms",
  "terms/biblical_narrative_names.csv",
  "--terms",
  "terms/biblical_prophets_cohort.csv",
  "--terms",
  "terms/eschatology_expanded_terms.csv",
  "--terms",
  "terms/isaiah53_servant_cohort.csv",
  "--terms",
  "terms/tabernacle_temple_terms.csv",
  "--terms",
  "terms/daniel_statue_metals.csv",
  "--terms",
  "terms/maccabean_apocrypha_names.csv",
  "--terms",
  "terms/frequency_anchors.csv",
  "--terms",
  "terms/null_controls.csv",
  "--hebrew-corpus",
  "MT_WLC=configs/example_oshb_wlc.toml",
  "--lxx-corpus",
  "LXX=configs/example_ebible_grclxx.toml",
  "--min-skip",
  "2",
  "--max-skip",
  "100",
  "--direction",
  "both",
  "--min-term-length",
  "3",
  "--max-hits-per-term",
  "100",
  "--corpus-jobs",
  "1",
  "--summary-out",
  "reports/mt_lxx_reciprocal_presence/concept_summary.csv",
  "--hits-out",
  "reports/mt_lxx_reciprocal_presence/hit_comparison.csv",
  "--markdown-out",
  "docs/MT_LXX_RECIPROCAL_PRESENCE.md",
  "--manifest-out",
  "reports/mt_lxx_reciprocal_presence/manifest.json",
]
inputs = [
  "scripts/analyze_mt_lxx_reciprocal_presence.py",
  "scripts/analyze_hit_version_presence.py",
  "scripts/analyze_hebrew_hit_version_presence.py",
  "scripts/analyze_mt_version_differences.py",
  "els/corpus.py",
  "els/search.py",
  "els/term_display.py",
  "terms/theological_terms.csv",
  "terms/prophetic_terms.csv",
  "terms/biblical_tribes.csv",
  "terms/biblical_festivals.csv",
  "terms/biblical_calendar.csv",
  "terms/biblical_narrative_names.csv",
  "terms/biblical_prophets_cohort.csv",
  "terms/eschatology_expanded_terms.csv",
  "terms/isaiah53_servant_cohort.csv",
  "terms/tabernacle_temple_terms.csv",
  "terms/daniel_statue_metals.csv",
  "terms/maccabean_apocrypha_names.csv",
  "terms/frequency_anchors.csv",
  "terms/null_controls.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_ebible_grclxx.toml",
]
outputs = [
  "reports/mt_lxx_reciprocal_presence/concept_summary.csv",
  "reports/mt_lxx_reciprocal_presence/hit_comparison.csv",
  "docs/MT_LXX_RECIPROCAL_PRESENCE.md",
  "reports/mt_lxx_reciprocal_presence/manifest.json",
]
