name = "wide_focus_exact_presence"
description = "Capped exact-hit version-presence review for the focused wide-search terms."
manifest_out = "reports/wide_focus_exact_presence/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "hebrew_exact_presence"
description = "Export capped exact Hebrew hit-pattern presence for focused modern/local/geopolitical and prophetic rows."
argv = [
  "-m", "scripts.analyze_hebrew_hit_version_presence",
  "--terms", "terms/modern_names_dates.csv",
  "--terms", "terms/prophetic_terms.csv",
  "--language", "hebrew",
  "--duplicate-term-id", "first",
  "--term-id", "trump_h",
  "--term-id", "donald_trump_h",
  "--term-id", "vance_h",
  "--term-id", "vance_alt_h",
  "--term-id", "netanyahu_h",
  "--term-id", "cowboy_h",
  "--term-id", "catering_h",
  "--term-id", "cowboy_catering_h",
  "--term-id", "simsberry_h",
  "--term-id", "simscorner_h",
  "--term-id", "united_states_h",
  "--term-id", "united_states_america_h",
  "--term-id", "usa_abbrev_h",
  "--term-id", "united_nations_h",
  "--term-id", "united_nations_acronym_h",
  "--term-id", "europe_h",
  "--term-id", "european_union_h",
  "--term-id", "france_h",
  "--term-id", "germany_h",
  "--term-id", "turkey_h",
  "--term-id", "turkey_alt_h",
  "--term-id", "russia_h",
  "--term-id", "iran_h",
  "--term-id", "nato_h",
  "--term-id", "confederacy_h",
  "--term-id", "china_h",
  "--term-id", "gog_h",
  "--term-id", "magog_h",
  "--term-id", "beast_h",
  "--term-id", "dragon_h",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--min-skip", "2",
  "--max-skip", "250",
  "--direction", "both",
  "--min-term-length", "4",
  "--max-hits-per-term", "200",
  "--corpus-jobs", "0",
  "--stable-family-label", "MT_WLC",
  "--stable-family-label", "UXLC",
  "--stable-family-label", "EBIBLE_WLC",
  "--stable-family-name", "Leningrad-family",
  "--report-title", "Wide Focus Hebrew Exact-Hit Presence",
  "--patterns-out", "reports/wide_focus_exact_presence/hebrew_hit_patterns.csv",
  "--summary-out", "reports/wide_focus_exact_presence/hebrew_term_summary.csv",
  "--markdown-out", "reports/wide_focus_exact_presence/hebrew_exact_presence.md",
  "--manifest-out", "reports/wide_focus_exact_presence/hebrew_manifest.json",
]
inputs = [
  "scripts/analyze_hebrew_hit_version_presence.py",
  "terms/modern_names_dates.csv",
  "terms/prophetic_terms.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_mam.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_uhb.toml",
  "els/corpus.py",
  "els/search.py",
  "scripts/analyze_mt_version_differences.py",
]
outputs = [
  "reports/wide_focus_exact_presence/hebrew_hit_patterns.csv",
  "reports/wide_focus_exact_presence/hebrew_term_summary.csv",
  "reports/wide_focus_exact_presence/hebrew_exact_presence.md",
  "reports/wide_focus_exact_presence/hebrew_manifest.json",
]

