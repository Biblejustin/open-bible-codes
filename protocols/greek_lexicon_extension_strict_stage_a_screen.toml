[[steps]]
id = "pattern_presence"
description = "Summarize exact extension-key presence by Greek NT source for Stage A screen rows."
argv = [
  "-m", "scripts.analyze_extension_presence",
  "--top-file", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_top.csv",
  "--top-file", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_byz_nt_top.csv",
  "--top-file", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tcg_nt_top.csv",
  "--top-file", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_sblgnt_top.csv",
  "--surface-context-hits", "reports/greek_lexicon_extension_strict_stage_a_screen/surface_context_hits.csv",
  "--require-center-exact",
  "--dedupe-rows",
  "--corpus", "TR_NT",
  "--corpus", "BYZ_NT",
  "--corpus", "TCG_NT",
  "--corpus", "SBLGNT",
  "--title", "Greek Lexicon Extension Strict Stage A Screen Pattern Presence",
  "--description", "Exact extension-key presence by Greek NT source for the strict locked Strong's Greek lexicon Stage A screen. This is not the Stage A control result.",
  "--summary-out", "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.csv",
  "--markdown-out", "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.md",
  "--manifest-out", "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.manifest.json",
]
inputs = [
  "scripts/analyze_extension_presence.py",
  "reports/greek_lexicon_extension_strict_stage_a_screen/surface_context_hits.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_top.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_byz_nt_top.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tcg_nt_top.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_sblgnt_top.csv",
]
outputs = [
  "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.md",
  "reports/greek_lexicon_extension_strict_stage_a_screen/pattern_presence.manifest.json",
]
