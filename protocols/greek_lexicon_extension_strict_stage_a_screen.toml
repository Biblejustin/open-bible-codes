[[steps]]
id = "extension_summary_tr_nt"
description = "Summarize strongest TR NT phrase-extension rows for the lexicon cohort."
parallel_group = "summaries"
argv = [
  "-m", "els", "extension-summary",
  "--extensions", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt.csv",
  "--min-extension-length", "3",
  "--min-term-length", "5",
  "--match-kind-prefix", "phrase_",
  "--top", "20000",
  "--out", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_summary.csv",
  "--top-out", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_top.csv",
  "--manifest-out", "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_summary.manifest.json",
]
inputs = [
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt.csv",
  "els/cli.py",
]
outputs = [
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_summary.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_top.csv",
  "reports/greek_lexicon_extension_strict_stage_a_screen/extensions_tr_nt_summary.manifest.json",
]

