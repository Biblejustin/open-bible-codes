name = "kjva_source_policy_blocker_packet"
description = "Aggregate KJVA source-policy options and blockers without importing Bible text or producing results."
manifest_out = "reports/kjva_source_policy_blocker_packet/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "kjva_source_policy_blocker_packet"
description = "Write non-text KJVA source-policy options and remaining blockers."
argv = ["-m", "scripts.build_kjva_source_policy_blocker_packet"]
inputs = [
  "scripts/build_kjva_source_policy_blocker_packet.py",
  "reports/kjva_current_source_lock_sidecar/summary.csv",
  "reports/kjva_gutenberg_candidate_checksum_sidecar/summary.csv",
  "reports/kjva_gutenberg_source_lock_blocker_packet/summary.csv",
  "reports/kjva_hakkaac_source_lock_decision_packet/summary.csv",
  "reports/kjva_gutenberg_hakkaac_split_source_role_sidecar/summary.csv",
]
outputs = [
  "reports/kjva_source_policy_blocker_packet/policy_options.csv",
  "reports/kjva_source_policy_blocker_packet/blockers.csv",
  "reports/kjva_source_policy_blocker_packet/summary.csv",
  "docs/KJVA_SOURCE_POLICY_BLOCKER_PACKET.md",
  "reports/kjva_source_policy_blocker_packet/manifest.json",
]
