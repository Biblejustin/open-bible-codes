name = "american_presidents_source_audit"
description = "Audit Torah-code.org American presidents data and transliteration-rule source PDFs without running ELS results."
manifest_out = "reports/wrr_1994/american_presidents_source_audit_protocol.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "download_wrr_sources"
description = "Download Torah-code.org experiment source PDFs into ignored reports output."
argv = [
  "-m", "scripts.download_wrr_sources",
  "--out-dir", "reports/wrr_1994",
  "--manifest-out", "reports/wrr_1994/sources.manifest.json",
]
inputs = [
  "scripts/download_wrr_sources.py",
]
outputs = [
  "reports/wrr_1994/torah_code_experiment_american_presidents_data.pdf",
  "reports/wrr_1994/torah_code_experiment_english_hebrew_transliteration_rules.pdf",
  "reports/wrr_1994/sources.manifest.json",
]

[[steps]]
id = "audit_american_presidents_source_shape"
description = "Extract source-shape counts and rule anchors from the American presidents PDFs."
argv = [
  "-m", "scripts.analyze_american_presidents_source",
  "--data-source", "reports/wrr_1994/torah_code_experiment_american_presidents_data.pdf",
  "--rules-source", "reports/wrr_1994/torah_code_experiment_english_hebrew_transliteration_rules.pdf",
  "--out", "reports/wrr_1994/american_presidents_source_records.csv",
  "--spellings-out", "reports/wrr_1994/american_presidents_source_spellings.csv",
  "--summary-out", "reports/wrr_1994/american_presidents_source_summary.csv",
  "--anchors-out", "reports/wrr_1994/american_presidents_protocol_anchors.csv",
  "--markdown-out", "docs/AMERICAN_PRESIDENTS_SOURCE_AUDIT.md",
  "--manifest-out", "reports/wrr_1994/american_presidents_source_audit.manifest.json",
]
inputs = [
  "scripts/analyze_american_presidents_source.py",
  "reports/wrr_1994/torah_code_experiment_american_presidents_data.pdf",
  "reports/wrr_1994/torah_code_experiment_english_hebrew_transliteration_rules.pdf",
]
outputs = [
  "reports/wrr_1994/american_presidents_source_records.csv",
  "reports/wrr_1994/american_presidents_source_spellings.csv",
  "reports/wrr_1994/american_presidents_source_summary.csv",
  "reports/wrr_1994/american_presidents_protocol_anchors.csv",
  "docs/AMERICAN_PRESIDENTS_SOURCE_AUDIT.md",
  "reports/wrr_1994/american_presidents_source_audit.manifest.json",
]
