[[steps]]
id = "summary_mt_wlc"
description = "Summarize MT_WLC same-skip phrase extensions."
parallel_group = "summaries"
argv = [
  "-m", "els", "extension-summary",
  "--extensions", "reports/modern_extension_screen/extensions_mt_wlc.csv",
  "--min-extension-length", "3",
  "--min-term-length", "4",
  "--match-kind-prefix", "phrase_",
  "--top", "50",
  "--out", "reports/modern_extension_screen/extensions_mt_wlc_summary.csv",
  "--top-out", "reports/modern_extension_screen/extensions_mt_wlc_top.csv",
  "--manifest-out", "reports/modern_extension_screen/extensions_mt_wlc_summary.manifest.json",
]
inputs = [
  "reports/modern_extension_screen/extensions_mt_wlc.csv",
  "els/cli.py",
]
outputs = [
  "reports/modern_extension_screen/extensions_mt_wlc_summary.csv",
  "reports/modern_extension_screen/extensions_mt_wlc_top.csv",
  "reports/modern_extension_screen/extensions_mt_wlc_summary.manifest.json",
]

