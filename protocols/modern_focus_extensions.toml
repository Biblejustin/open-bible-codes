name = "modern_focus_extensions"
description = "Capped same-skip extension screen for modern names, places, and local terms."
manifest_out = "reports/modern_extension_screen/protocol_run.manifest.json"
max_parallel = 3
progress_interval_seconds = 15

[[steps]]
id = "modern_surface_hits"
description = "Collect capped modern-term ELS hits across selected Hebrew and Greek corpora."
argv = [
  "-m", "els", "surface-context",
  "--terms", "terms/modern_names_dates.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--corpus", "LXX=configs/example_ebible_grclxx.toml",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--min-skip", "2",
  "--max-skip", "100",
  "--min-term-length", "4",
  "--max-hits-per-term", "25",
  "--include-all",
  "--jobs", "0",
  "--out", "reports/modern_extension_screen/surface_context_hits.csv",
  "--summary-out", "reports/modern_extension_screen/surface_context_summary.csv",
  "--manifest-out", "reports/modern_extension_screen/surface_context.manifest.json",
]
inputs = [
  "terms/modern_names_dates.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/search.py",
  "els/surface.py",
]
outputs = [
  "reports/modern_extension_screen/surface_context_hits.csv",
  "reports/modern_extension_screen/surface_context_summary.csv",
  "reports/modern_extension_screen/surface_context.manifest.json",
]

[[steps]]
id = "extensions_mt_wlc"
description = "Check same-skip surface-word and phrase extensions for MT_WLC modern hits."
parallel_group = "extensions"
argv = [
  "-m", "els", "extensions",
  "--config", "configs/example_oshb_wlc.toml",
  "--hits", "reports/modern_extension_screen/surface_context_hits.csv",
  "--corpus-label", "MT_WLC",
  "--max-before", "12",
  "--max-after", "12",
  "--phrase-words", "4",
  "--include-both-sided",
  "--max-extensions-per-hit", "20",
  "--out", "reports/modern_extension_screen/extensions_mt_wlc.csv",
  "--manifest-out", "reports/modern_extension_screen/extensions_mt_wlc.manifest.json",
]
inputs = [
  "reports/modern_extension_screen/surface_context_hits.csv",
  "configs/example_oshb_wlc.toml",
  "els/cli.py",
  "els/corpus.py",
  "els/extensions.py",
  "els/search.py",
]
outputs = [
  "reports/modern_extension_screen/extensions_mt_wlc.csv",
  "reports/modern_extension_screen/extensions_mt_wlc.manifest.json",
]

