name = "doxa_four_source_claim_followup"
description = "Locked 5000/5000 four-source follow-up for the strongest Greek exact-center doxa extension row."
manifest_out = "reports/doxa_four_source_claim_followup/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 30

[[steps]]
id = "paired_controls"
description = "Run 5000 shuffled-term and 5000 same-length random controls for the registered four-source doxa overlap key."
argv = [
  "-m", "scripts.analyze_extension_paired_controls",
  "--top-file", "reports/greek_exact_center_four_source/extensions_tr_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_tcg_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_sblgnt_top.csv",
  "--surface-context-hits", "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "--require-center-exact",
  "--include-overlap-key", "δοξα|21|forward|term_plus_after|δοξανωσ|δοξανωσ",
  "--dedupe-targets",
  "--term-control-samples", "5000",
  "--random-control-samples", "5000",
  "--jobs", "0",
  "--max-examples", "200",
  "--summary-out", "reports/doxa_four_source_claim_followup/paired_controls_summary.csv",
  "--examples-out", "reports/doxa_four_source_claim_followup/paired_controls_examples.csv",
  "--markdown-out", "reports/doxa_four_source_claim_followup/paired_controls.md",
  "--manifest-out", "reports/doxa_four_source_claim_followup/paired_controls.manifest.json",
]
inputs = [
  "scripts/analyze_extension_paired_controls.py",
  "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "reports/greek_exact_center_four_source/extensions_tr_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_tcg_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_sblgnt_top.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/extensions.py",
  "els/search.py",
  "els/statistics.py",
]
outputs = [
  "reports/doxa_four_source_claim_followup/paired_controls_summary.csv",
  "reports/doxa_four_source_claim_followup/paired_controls_examples.csv",
  "reports/doxa_four_source_claim_followup/paired_controls.md",
  "reports/doxa_four_source_claim_followup/paired_controls.manifest.json",
]

[[steps]]
id = "context_review"
description = "Build context and letter-path review for the registered doxa follow-up rows."
argv = [
  "-m", "scripts.analyze_extension_context_review",
  "--top-file", "reports/greek_exact_center_four_source/extensions_tr_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_tcg_nt_top.csv",
  "--top-file", "reports/greek_exact_center_four_source/extensions_sblgnt_top.csv",
  "--controls", "reports/doxa_four_source_claim_followup/paired_controls_summary.csv",
  "--surface-context-hits", "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "--require-center-exact",
  "--require-control-row",
  "--dedupe-targets",
  "--title", "Doxa Four-Source Claim Follow-Up Review",
  "--description", "Context and letter-path review for the locked four-source doxa exact-center extension follow-up.",
  "--summary-out", "reports/doxa_four_source_claim_followup/context_review_summary.csv",
  "--markdown-out", "reports/doxa_four_source_claim_followup/context_review.md",
  "--letter-paths-out", "reports/doxa_four_source_claim_followup/letter_paths.md",
  "--manifest-out", "reports/doxa_four_source_claim_followup/context_review.manifest.json",
]
inputs = [
  "scripts/analyze_extension_context_review.py",
  "reports/greek_exact_center_four_source/surface_context_hits.csv",
  "reports/greek_exact_center_four_source/extensions_tr_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_byz_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_tcg_nt_top.csv",
  "reports/greek_exact_center_four_source/extensions_sblgnt_top.csv",
  "reports/doxa_four_source_claim_followup/paired_controls_summary.csv",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "els/corpus.py",
  "els/normalization.py",
]
outputs = [
  "reports/doxa_four_source_claim_followup/context_review_summary.csv",
  "reports/doxa_four_source_claim_followup/context_review.md",
  "reports/doxa_four_source_claim_followup/letter_paths.md",
  "reports/doxa_four_source_claim_followup/context_review.manifest.json",
]
