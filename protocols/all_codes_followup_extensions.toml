name = "all_codes_followup_extensions"
description = "Same-skip before/after extension audit for selected all-codes rows."
manifest_out = "reports/all_codes_followup_extensions/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "extensions"
description = "Check selected hidden paths for same-skip before/after surface lexicon extensions."
argv = [
  "-m", "scripts.analyze_all_codes_extensions",
  "--path-summary", "reports/all_codes_followup_letter_paths/path_summary.csv",
  "--corpus", "MT_WLC=configs/example_oshb_wlc.toml",
  "--corpus", "UXLC=configs/example_uxlc.toml",
  "--corpus", "EBIBLE_WLC=configs/example_ebible_hebwlc.toml",
  "--corpus", "MAM=configs/example_mam.toml",
  "--corpus", "UHB=configs/example_uhb.toml",
  "--corpus", "TR_NT=configs/example_ebible_grctr.toml",
  "--corpus", "BYZ_NT=configs/example_ebible_grcmt.toml",
  "--corpus", "TCG_NT=configs/example_ebible_grctcgnt.toml",
  "--corpus", "SBLGNT=configs/example_sblgnt.toml",
  "--corpus", "KJV=configs/example_ebible_engkjv.toml",
  "--max-before", "12",
  "--max-after", "12",
  "--phrase-words", "4",
  "--include-both-sided",
  "--max-extensions-per-path", "20",
  "--extensions-out", "reports/all_codes_followup_extensions/extensions.csv",
  "--compound-out", "reports/all_codes_followup_extensions/compound_extensions.csv",
  "--summary-out", "reports/all_codes_followup_extensions/summary.csv",
  "--markdown-out", "docs/ALL_CODES_FOLLOWUP_EXTENSIONS.md",
  "--manifest-out", "reports/all_codes_followup_extensions/manifest.json",
]
inputs = [
  "scripts/analyze_all_codes_extensions.py",
  "reports/all_codes_followup_letter_paths/path_summary.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
  "configs/example_sblgnt.toml",
  "configs/example_ebible_engkjv.toml",
  "els/extensions.py",
  "els/corpus.py",
]
outputs = [
  "reports/all_codes_followup_extensions/extensions.csv",
  "reports/all_codes_followup_extensions/compound_extensions.csv",
  "reports/all_codes_followup_extensions/summary.csv",
  "docs/ALL_CODES_FOLLOWUP_EXTENSIONS.md",
  "reports/all_codes_followup_extensions/manifest.json",
]
