name = "match_strata_index"
description = "Annotate centered occurrences with extended post-search strata that do not widen search by themselves."
manifest_out = "reports/match_strata_index/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "match_strata_index"
description = "Build direction, canonical-first, boundary, and cross-skip strata over the centered occurrence index."
argv = ["-m", "scripts.build_match_strata_index", "--cross-skip-letter-distance", "10"]
inputs = [
  "scripts/build_match_strata_index.py",
  "els/match_strata.py",
  "els/gematria.py",
  "els/letter_stats.py",
  "els/corpus.py",
  "els/term_display.py",
  "terms/meaningful_constants.csv",
  "data/study/mappings/thematic_chapters.csv",
  "data/study/mappings/author_book_mapping.csv",
  "data/study/mappings/protagonist_narrative_mapping.csv",
  "data/study/mappings/ot_in_nt_quotations.csv",
  "data/study/mappings/mt_lxx_semantic_divergence.csv",
  "reports/centered_occurrence_index/centered_occurrences.csv",
  "configs/example_oshb_wlc.toml",
  "configs/example_uxlc.toml",
  "configs/example_ebible_hebwlc.toml",
  "configs/example_mam.toml",
  "configs/example_uhb.toml",
  "configs/example_ebible_grclxx.toml",
  "configs/example_ebible_engkjv.toml",
  "configs/example_ebible_engkjv_apocrypha.toml",
  "configs/example_ebible_grctr.toml",
  "configs/example_sblgnt.toml",
  "configs/example_ebible_grcmt.toml",
  "configs/example_ebible_grctcgnt.toml",
]
outputs = [
  "reports/match_strata_index/occurrence_strata.csv",
  "reports/match_strata_index/strata_summary.csv",
  "docs/MATCH_STRATA_INDEX.md",
  "reports/match_strata_index/manifest.json",
]
