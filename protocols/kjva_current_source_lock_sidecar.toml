name = "kjva_current_source_lock_sidecar"
description = "Build a non-text checksum/order sidecar for the current eBible KJV + Apocrypha rerun baseline."
manifest_out = "reports/kjva_current_source_lock_sidecar/protocol_run.manifest.json"
max_parallel = 1
progress_interval_seconds = 15

[[steps]]
id = "kjva_current_source_lock_sidecar"
description = "Freeze current eBible KJVA rerun baseline by checksum, book order, and count-only shape."
argv = ["-m", "scripts.build_kjva_current_source_lock_sidecar"]
inputs = [
  "scripts/build_kjva_current_source_lock_sidecar.py",
  "data/processed/ebible/eng-kjv.csv",
  "data/processed/ebible/eng-kjv.manifest.json",
]
outputs = [
  "reports/kjva_current_source_lock_sidecar/book_shape.csv",
  "reports/kjva_current_source_lock_sidecar/summary.csv",
  "docs/KJVA_CURRENT_SOURCE_LOCK_SIDECAR.md",
  "reports/kjva_current_source_lock_sidecar/manifest.json",
]
